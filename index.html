                    <div className="min-w-0 flex-1"><p className="text-sm font-semibold text-[#1B1B1B] truncate">{a.full_name || a.email}</p>{a.full_name && <p className="text-xs text-gray-400 truncate">{a.email}</p>}</div>
                    <div className="flex items-center gap-2.5 ml-3 flex-shrink-0"><RoleBadge role={a.role} /><div className={`w-2 h-2 rounded-full ${active ? "bg-green-400" : "bg-gray-200"}`} /><button onClick={() => rm(a.id, a.email)} className="text-gray-300 hover:text-red-400 text-xl leading-none transition-colors">&times;</button></div>
                  </div>);
              })}</div>
            }
          </div>
        </div>
      );
    };

    // ── Dashboard ─────────────────────────────────────────────────────────────
    const Dashboard = ({ session, userRole }) => {
      const { role, full_name } = userRole;
      const uid = session.user.id;
      const uemail = session.user.email;
      const uname = full_name || uemail.split("@")[0];
      const isTA = role === "ta";

      const [opps, setOpps] = useState([]);
      const [loading, setLoad] = useState(true);
      const [search, setSearch] = useState("");
      const [fStage, setFStage] = useState("");
      const [fSrc, setFSrc] = useState("");
      const [fDateFrom, setFDateFrom] = useState("");
      const [fDateTo, setFDateTo] = useState("");
      const [modal, setModal] = useState(null);
      const [nav, setNav] = useState(isTA ? "hiring" : "opps");
      const [sort, setSort] = useState({ field: "created_at", dir: "desc" });
      const [delId, setDelId] = useState(null);
      const [stagePopup, setStagePopup] = useState(null);
      const [stageBusy, setStageBusy] = useState(null);
      const [fwdModal, setFwdModal] = useState(null);
      const [webhookUrl, setWHUrl] = useState("");
      const [viewOpp, setViewOpp] = useState(null);
      const [uploadModal, setUploadModal] = useState(false);

      const handleUploadApply = prefill => {
        setUploadModal(false);
        setModal({ mode: "prefill", data: prefill });
      };

      useEffect(() => {
        dbO.load().then(d => { setOpps(d); setLoad(false); }).catch(() => setLoad(false));
        dbS.get("notification_webhook").then(u => setWHUrl(u || "")).catch(() => { });
      }, []);

      const pushNotif = async (type, message, oppId, clientName, meta = {}) => {
        try { await dbN.add({ type, message, opportunity_id: oppId, opp_client_name: clientName, meta }); } catch { }
        fireWebhook(webhookUrl, { type, message, client: clientName, opportunity_id: oppId, timestamp: new Date().toISOString(), ...meta });
      };

      const filtered = useMemo(() => {
        let r = [...opps];
        if (search) { const q = search.toLowerCase(); r = r.filter(o => [o.clientName, o.primaryPlatform, ...(o.platforms || []), o.opportunityOwner, o.source].some(v => (v || "").toLowerCase().includes(q))); }
        if (fStage) r = r.filter(o => o.stage === fStage);
        if (fSrc) r = r.filter(o => o.source === fSrc);
        if (fDateFrom) r = r.filter(o => o.created_at && o.created_at.slice(0, 10) >= fDateFrom);
        if (fDateTo) r = r.filter(o => o.created_at && o.created_at.slice(0, 10) <= fDateTo);
        r.sort((a, b) => { let va = a[sort.field] || "", vb = b[sort.field] || ""; if (sort.field === "potentialMonthlyRevenue") { va = Number(va) || 0; vb = Number(vb) || 0; } return sort.dir === "asc" ? (va > vb ? 1 : -1) : (va < vb ? 1 : -1); });
        return r;
      }, [opps, search, fStage, fSrc, sort]);

      const stats = useMemo(() => { const active = opps.filter(o => !["Won", "Lost", "On Hold"].includes(o.stage)); const won = opps.filter(o => o.stage === "Won"); return { total: opps.length, active: active.length, pipe: active.reduce((s, o) => s + toUSD(o.potentialMonthlyRevenue || o.projectCost, o.revenueCurrency || o.projectCostCurrency || "USD"), 0), won: won.reduce((s, o) => s + toUSD(o.potentialMonthlyRevenue || o.projectCost, o.revenueCurrency || o.projectCostCurrency || "USD"), 0) }; }, [opps]);

      const togSort = f => setSort(s => s.field === f ? { ...s, dir: s.dir === "asc" ? "desc" : "asc" } : { field: f, dir: "asc" });
      const Arr = ({ f }) => sort.field === f ? <span className="ml-0.5 opacity-50">{sort.dir === "asc" ? "↑" : "↓"}</span> : null;

      const handleDel = async id => {
        if (!confirm("Delete this opportunity? Cannot be undone.")) return;
        setDelId(id);
        try { await dbO.del(id); setOpps(p => p.filter(o => o.id !== id)); } catch { }
        setDelId(null);
      };

      const handleStageChange = async (oppId, newStage) => {
        const opp = opps.find(o => o.id === oppId); if (!opp) return;
        setStageBusy(oppId); setStagePopup(null);
        try {
          const { id, created_at, ...payload } = opp;
          await dbO.upd(oppId, { ...payload, stage: newStage, primaryPlatform: (opp.platforms || [])[0] || opp.primaryPlatform || "" });
          setOpps(prev => prev.map(o => o.id === oppId ? { ...o, stage: newStage } : o));
          const type = newStage === "Won" ? "opp_won" : "stage_changed";
          const msg = newStage === "Won"
            ? `\u{1F3C6} "${opp.clientName || "Unnamed"}" \u2014 WON! ${opp.potentialMonthlyRevenue ? `(${fmtINR(Number(opp.potentialMonthlyRevenue))}/mo)` : ""}`
            : `\u{1F4CB} "${opp.clientName || "Unnamed"}" moved to "${newStage}" by ${uname}`;
          await pushNotif(type, msg.trim(), oppId, opp.clientName, { old_stage: opp.stage, new_stage: newStage, changed_by: uemail });
        } catch { }
        setStageBusy(null);
      };

      const onSaved = async o => {
        try {
          const isNew = !opps.find(x => x.id === o.id);
          setOpps(prev => { const i = prev.findIndex(x => x.id === o.id); return i >= 0 ? prev.map(x => x.id === o.id ? o : x) : [o, ...prev]; });
          if (isNew) await pushNotif("opp_added", `\u2728 New opportunity: "${o.clientName || "Unnamed"}" added by ${uname}`, o.id, o.clientName, { stage: o.stage, owner: uname });
        } catch { dbO.load().then(d => setOpps(d)).catch(() => { }); }
      };

      const filtPipe = filtered.reduce((s, o) => s + toUSD(o.potentialMonthlyRevenue || o.projectCost, o.revenueCurrency || o.projectCostCurrency || "USD"), 0);

      const getPlatformDisplay = o => {
        const p = o.platforms && o.platforms.length ? o.platforms : (o.primaryPlatform ? [o.primaryPlatform] : []);
        if (!p.length) return "\u2014"; if (p.length === 1) return p[0]; return `${p[0]} +${p.length - 1}`;
      };

      const navTabs = [
        ...(!isTA ? [["opps", "&#128202; Opportunities"]] : []),
        ["hiring", "&#127919; Hiring Roles"],
        ...(can.team(role) ? [["team", "&#128101; Team"]] : []),
      ];

      return (
        <div className="min-h-screen bg-gray-50 flex flex-col">
          <header className="bg-[#1B1B1B] px-5 py-3 flex items-center justify-between sticky top-0 z-40 shadow-xl">
            <div className="flex items-center gap-3">
              <img src="https://www.mavlers.com/images/MavlersLogo.svg" alt="Mavlers" className="h-7 brightness-0 invert flex-shrink-0" />
              <div className="w-px h-5 bg-gray-600" />
              <span className="text-white text-sm font-bold tracking-wide hidden sm:block">Opportunity Tracker</span>
            </div>
            <div className="flex items-center gap-2.5">
              <NotificationBell userId={uid} />
              <div className="w-px h-5 bg-gray-600" />
              <div className="text-right hidden md:block"><p className="text-white text-xs font-semibold leading-tight">{uname}</p><p className="text-gray-500 text-xs">{uemail}</p></div>
              <RoleBadge role={role} />
              <button onClick={() => db.auth.signOut()} className="text-xs text-gray-500 hover:text-[#FFDD2F] font-medium transition-colors ml-1">Sign out</button>
            </div>
          </header>

          <div className="bg-white border-b border-gray-200 px-5">
            <div className="flex">
              {navTabs.map(([t, l]) => (
                <button key={t} onClick={() => setNav(t)} className={`py-3 px-4 text-xs sm:text-sm font-bold transition-all border-b-2 ${nav === t ? "border-[#FFDD2F] text-[#1B1B1B]" : "border-transparent text-gray-400 hover:text-gray-600"}`} dangerouslySetInnerHTML={{ __html: l }} />
              ))}
            </div>
          </div>

          {nav === "team" && can.team(role) ? <TeamPage /> :
            nav === "hiring" ? <HiringRolesPage role={role} /> : (
              <div className="flex-1 p-4 sm:p-6 max-w-7xl mx-auto w-full">
                <div className="grid grid-cols-2 lg:grid-cols-4 gap-3 mb-5">
                  <StatCard label="Total Opps" value={stats.total} />
                  <StatCard label="Active Pipeline" value={stats.active} sub="excl. Won / Lost" />
                  <StatCard label="Pipeline Value" value={fmtUSD(stats.pipe)} hi sub="active opps · USD" />
                  <StatCard label="Monthly Won" value={fmtUSD(stats.won)} sub="closed · USD" />
                </div>
                <div className="bg-white rounded-xl border border-gray-100 shadow-sm p-3 mb-4">
                  <div className="flex flex-wrap gap-2 items-center">
                    <input value={search} onChange={e => setSearch(e.target.value)} placeholder="&#128269;  Search client, platform, owner&#8230;" className="flex-1 min-w-36 px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-[#FFDD2F]" />
                    <select value={fStage} onChange={e => setFStage(e.target.value)} className="px-3 py-2 border border-gray-200 rounded-lg text-sm bg-white focus:outline-none focus:ring-2 focus:ring-[#FFDD2F]"><option value="">All Stages</option>{STAGES.map(s => <option key={s} value={s}>{s}</option>)}</select>
                    <select value={fSrc} onChange={e => setFSrc(e.target.value)} className="px-3 py-2 border border-gray-200 rounded-lg text-sm bg-white focus:outline-none focus:ring-2 focus:ring-[#FFDD2F]"><option value="">All Sources</option>{SOURCES.map(s => <option key={s} value={s}>{s}</option>)}</select>
                    <input type="date" value={fDateFrom} onChange={e => setFDateFrom(e.target.value)} title="From date" className="px-3 py-2 border border-gray-200 rounded-lg text-sm bg-white focus:outline-none focus:ring-2 focus:ring-[#FFDD2F]" />
                    <input type="date" value={fDateTo} onChange={e => setFDateTo(e.target.value)} title="To date" className="px-3 py-2 border border-gray-200 rounded-lg text-sm bg-white focus:outline-none focus:ring-2 focus:ring-[#FFDD2F]" />
                    {(fStage || fSrc || search || fDateFrom || fDateTo) && <button onClick={() => { setSearch(""); setFStage(""); setFSrc(""); setFDateFrom(""); setFDateTo(""); }} className="px-3 py-2 text-xs font-semibold text-gray-400 hover:text-red-500 border border-gray-200 rounded-lg transition-colors">&#10005; Clear</button>}
                    <div className="flex-1" />
                    {can.create(role) && <button onClick={() => setUploadModal(true)} className="flex items-center gap-1.5 px-4 py-2 bg-gray-100 text-gray-700 rounded-lg text-sm font-bold hover:bg-gray-200 transition-colors whitespace-nowrap">&#128196; Upload Opportunity</button>}
                    {can.create(role) && <button onClick={() => setModal({ mode: "add" })} className="flex items-center gap-1.5 px-4 py-2 bg-[#FFDD2F] text-[#1B1B1B] rounded-lg text-sm font-bold hover:bg-[#f5d000] transition-colors whitespace-nowrap shadow-sm">+ Add Opportunity</button>}
                  </div>
                </div>
                <div className="bg-white rounded-xl border border-gray-100 shadow-sm overflow-hidden">
                  {loading
                    ? <div className="flex flex-col items-center justify-center p-16 gap-4"><Spinner sz="w-8 h-8" /><p className="text-sm text-gray-400">Loading opportunities&#8230;</p></div>
                    : filtered.length === 0
                      ? <div className="text-center py-16"><div className="text-5xl mb-3">&#128203;</div><p className="text-gray-600 font-semibold">No opportunities found</p><p className="text-gray-400 text-sm mt-1">{can.create(role) ? "Click + Add Opportunity to get started." : "No entries match your filters."}</p></div>
                      : (<>
                        <div className="overflow-x-auto">
                          <table className="w-full text-sm">
                            <thead>
                              <tr className="border-b border-gray-100 text-xs text-gray-400 font-bold uppercase tracking-wide bg-gray-50/80">
                                <th className="px-5 py-3 text-left cursor-pointer hover:text-[#1B1B1B] select-none" onClick={() => togSort("clientName")}>Client<Arr f="clientName" /></th>
                                <th className="px-4 py-3 text-left cursor-pointer hover:text-[#1B1B1B] select-none" onClick={() => togSort("primaryPlatform")}>Platform<Arr f="primaryPlatform" /></th>
                                <th className="px-4 py-3 text-left cursor-pointer hover:text-[#1B1B1B] select-none" onClick={() => togSort("stage")}>Stage<Arr f="stage" /></th>
                                <th className="px-4 py-3 text-left cursor-pointer hover:text-[#1B1B1B] select-none" onClick={() => togSort("potentialMonthlyRevenue")}>Revenue<Arr f="potentialMonthlyRevenue" /></th>
                                <th className="px-4 py-3 text-left hidden md:table-cell">Source</th>
                                <th className="px-4 py-3 text-left hidden lg:table-cell">Owner</th>
                                <th className="px-4 py-3 text-left hidden xl:table-cell cursor-pointer hover:text-[#1B1B1B] select-none" onClick={() => togSort("created_at")}>Added<Arr f="created_at" /></th>
                                <th className="px-4 py-3 w-36" />
                              </tr>
                            </thead>
                            <tbody className="divide-y divide-gray-50">
                              {filtered.map(o => (
                                <tr key={o.id} onClick={() => setViewOpp(o)} className="hover:bg-[#FFFEF5] transition-colors group cursor-pointer">
                                  <td className="px-5 py-3.5">
                                    <div className="flex items-center gap-2">
                                      <div className="min-w-0"><p className="font-bold text-[#1B1B1B] truncate max-w-[160px]">{o.clientName || <span className="text-gray-300 italic font-normal">Unnamed</span>}</p>{o.industry && <p className="text-xs text-gray-400">{o.industry}{o.clientSize ? ` \u00B7 ${o.clientSize}` : ""}</p>}</div>
                                      <span className="opacity-0 group-hover:opacity-100 transition-opacity text-gray-400 flex-shrink-0 text-sm" title="Click to view details">&#128065;</span>
                                    </div>
                                  </td>
                                  <td className="px-4 py-3.5 text-gray-600 truncate max-w-[140px]">{getPlatformDisplay(o)}</td>
                                  <td className="px-4 py-3.5 relative" onClick={e => e.stopPropagation()}>
                                    {stageBusy === o.id
                                      ? <Spinner sz="w-4 h-4" c="border-gray-400" />
                                      : <div className="relative inline-block">
                                        <button onClick={() => can.edit(role, o, uid) ? setStagePopup(stagePopup === o.id ? null : o.id) : null} title={can.edit(role, o, uid) ? "Click to change stage" : undefined} className={`${can.edit(role, o, uid) ? "cursor-pointer hover:opacity-80" : "cursor-default"} transition-opacity`}>
                                          <StageBadge stage={o.stage || "New Lead"} />
                                        </button>
                                        {stagePopup === o.id && <StageDropdown currentStage={o.stage || "New Lead"} onSelect={s => handleStageChange(o.id, s)} onClose={() => setStagePopup(null)} />}
                                      </div>
                                    }
                                  </td>
                                  <td className="px-4 py-3.5">
                                    {(o.potentialMonthlyRevenue || o.projectCost)
                                      ? <div><span className="font-bold text-[#1B1B1B]">{fmtCurr(o.potentialMonthlyRevenue || o.projectCost, o.revenueCurrency || o.projectCostCurrency || "USD")}</span>{(o.revenueCurrency || o.projectCostCurrency || "USD") !== "USD" && <span className="text-[10px] text-gray-400 block">{fmtUSD(toUSD(o.potentialMonthlyRevenue || o.projectCost, o.revenueCurrency || o.projectCostCurrency || "USD"))} USD</span>}</div>
                                      : <span className="text-gray-300">&mdash;</span>}
                                  </td>
                                  <td className="px-4 py-3.5 text-gray-500 hidden md:table-cell">{o.source || "\u2014"}</td>
                                  <td className="px-4 py-3.5 text-gray-500 text-xs hidden lg:table-cell truncate max-w-[120px]">{o.opportunityOwner || "\u2014"}</td>
                                  <td className="px-4 py-3.5 text-gray-400 text-xs hidden xl:table-cell whitespace-nowrap">{fmtDate(o.created_at)}</td>
                                  <td className="px-4 py-3.5" onClick={e => e.stopPropagation()}>
                                    <div className="flex gap-1 justify-end opacity-0 group-hover:opacity-100 transition-opacity">
                                      {can.forwardTA(role) && <button onClick={() => setFwdModal(o)} className="px-2.5 py-1.5 text-xs font-bold rounded-lg bg-orange-50 text-orange-600 hover:bg-orange-100 transition-colors whitespace-nowrap" title="Forward to TA">&#127919; TA</button>}
                                      {can.edit(role, o, uid) && <button onClick={() => setModal({ mode: "edit", data: o })} className="px-2.5 py-1.5 text-xs font-bold rounded-lg bg-[#FFDD2F]/20 text-[#1B1B1B] hover:bg-[#FFDD2F] transition-colors">Edit</button>}
                                      {can.del(role) && <button onClick={() => handleDel(o.id)} disabled={delId === o.id} className="px-2.5 py-1.5 text-xs font-bold rounded-lg bg-gray-100 text-gray-500 hover:bg-red-50 hover:text-red-600 disabled:opacity-50 transition-colors">{delId === o.id ? "&#8230;" : "Del"}</button>}
                                    </div>
                                  </td>
                                </tr>
                              ))}
                            </tbody>
                          </table>
                        </div>
                        <div className="px-5 py-3 border-t border-gray-100 bg-gray-50/50 flex items-center justify-between flex-wrap gap-2">
                          <p className="text-xs text-gray-400 font-medium">Showing <strong className="text-[#1B1B1B]">{filtered.length}</strong> of <strong className="text-[#1B1B1B]">{opps.length}</strong> opportunities</p>
                          <p className="text-xs text-gray-400 font-medium">Filtered pipeline: <strong className="text-[#1B1B1B]">{fmtUSD(filtPipe)}</strong> USD</p>
                        </div>
                      </>)
                  }
                </div>
              </div>
            )}
          {modal && <OppModal editData={modal.mode === "edit" ? modal.data : null} prefillData={modal.mode === "prefill" ? modal.data : null} userId={uid} role={role} updatedBy={uname} onClose={() => { setModal(null); dbO.load().then(d => setOpps(d)).catch(() => { }); }} onSaved={onSaved} />}
          {uploadModal && <UploadModal onClose={() => setUploadModal(false)} onApply={handleUploadApply} />}
          {fwdModal && <ForwardToTAModal opp={fwdModal} userEmail={uemail} userName={uname} onClose={() => setFwdModal(null)} onForwarded={() => { }} />}
          {viewOpp && <ViewPanel opp={viewOpp} onClose={() => setViewOpp(null)} role={role} uid={uid} onEdit={() => { setModal({ mode: "edit", data: viewOpp }); setViewOpp(null); }} />}
        </div>
      );
    };

    // ── View Panel (read-only slide-in) ──────────────────────────────────────
    const ViewPanel = ({ opp, onClose, role, uid, onEdit }) => {
      const Row = ({ label, value }) => value ? (
        <div className="py-2.5 border-b border-gray-50 last:border-0">
          <p className="text-[10px] font-bold text-gray-400 uppercase tracking-wider mb-0.5">{label}</p>
          <p className="text-sm text-[#1B1B1B] font-medium leading-snug">{value}</p>
        </div>
      ) : null;
      const Block = ({ label, value }) => value ? (
        <div>
          <p className="text-[10px] font-bold text-gray-400 uppercase tracking-wider mb-1.5">{label}</p>
          <p className="text-sm text-gray-700 leading-relaxed whitespace-pre-wrap bg-gray-50 rounded-xl p-4">{value}</p>
        </div>
      ) : null;

      const platforms = opp.platforms && opp.platforms.length ? opp.platforms : (opp.primaryPlatform ? [opp.primaryPlatform] : []);
      const sm = STAGE_META[opp.stage || "New Lead"] || STAGE_META["New Lead"];
      const isP2P = opp.engagementType === "Project-to-Project";
      const revAmt = opp.potentialMonthlyRevenue;
      const projAmt = opp.projectCost;
      const revCur = opp.revenueCurrency || "USD";
      const projCur = opp.projectCostCurrency || "USD";
      const expertise = Array.isArray(opp.expertiseNeeded) ? opp.expertiseNeeded.join(", ") : (opp.expertiseNeeded || "");

      return (
        <div className="fixed inset-0 z-[55] flex justify-end" onClick={onClose}>
          <div className="absolute inset-0 bg-black/40 backdrop-blur-sm" />
          <div className="relative w-full max-w-md bg-white h-full flex flex-col shadow-2xl overflow-hidden"
            onClick={e => e.stopPropagation()}>

            {/* Header */}
            <div className="flex items-start justify-between px-5 py-4 bg-[#1B1B1B]">
              <div className="min-w-0">
                <h2 className="text-base font-bold text-white truncate">{opp.clientName || "Unnamed"}</h2>
                {opp.industry && <p className="text-xs text-gray-400 mt-0.5">{opp.industry}{opp.clientSize ? ` · ${opp.clientSize}` : ""}</p>}
                {opp.website && <a href={opp.website} target="_blank" rel="noreferrer" className="text-xs text-[#FFDD2F] hover:underline mt-0.5 block truncate">{opp.website}</a>}
              </div>
              <div className="flex items-center gap-2 ml-3 flex-shrink-0">
                <span className={`text-xs font-bold px-2 py-1 rounded-full border ${sm.bg} ${sm.text} ${sm.border}`}>{opp.stage || "New Lead"}</span>
                <button onClick={onClose} className="w-7 h-7 flex items-center justify-center rounded-full bg-white/10 text-white hover:bg-white/20 text-lg leading-none transition-colors">&times;</button>
              </div>
            </div>

            {/* Body */}
            <div className="flex-1 overflow-y-auto p-5 space-y-4">

              {/* Platforms */}
              {platforms.length > 0 && (
                <div>
                  <p className="text-[10px] font-bold text-gray-400 uppercase tracking-wider mb-2">Platform(s)</p>
                  <div className="flex flex-wrap gap-1.5">
                    {platforms.map(p => <span key={p} className="text-xs bg-blue-50 text-blue-700 border border-blue-200 px-2.5 py-1 rounded-full font-semibold">{p}</span>)}
                  </div>
                </div>
              )}

              {/* Ownership & commercial */}
              <div className="bg-gray-50 rounded-xl p-4 space-y-0">
                <Row label="Opportunity Owner" value={opp.opportunityOwner} />
                <Row label="Assigned Sales" value={opp.assignedToSales} />
                <Row label="Source" value={opp.source} />
                <Row label="Engagement Type" value={opp.engagementType} />
                <Row label="Client Timezone" value={opp.clientTimezone} />
                <Row label="Support Window" value={opp.supportWindow} />
                {!isP2P && <Row label="Est. Hours / Month" value={opp.estimatedHours ? `${opp.estimatedHours} hrs` : null} />}
                {!isP2P && revAmt && <Row label="Monthly Revenue" value={`${fmtCurr(revAmt, revCur)}${revCur !== "USD" ? ` (≈ ${fmtUSD(toUSD(revAmt, revCur))} USD)` : ""}`} />}
                {isP2P && projAmt && <Row label="Project Cost" value={`${fmtCurr(projAmt, projCur)}${projCur !== "USD" ? ` (≈ ${fmtUSD(toUSD(projAmt, projCur))} USD)` : ""}`} />}
                {isP2P && <Row label="Project Timeline" value={opp.projectTimeline} />}
                <Row label="Budget Range" value={opp.budgetRange} />
              </div>

              {/* POC */}
              {(opp.pocName || opp.pocEmail) && (
                <div className="bg-gray-50 rounded-xl p-4 space-y-0">
                  <Row label="POC Name" value={opp.pocName} />
                  <Row label="POC Title" value={opp.pocTitle} />
                  <Row label="POC Email" value={opp.pocEmail} />
                  <Row label="POC Phone" value={opp.pocPhone} />
                </div>
              )}

              {/* Expertise */}
              {expertise && (
                <div>
                  <p className="text-[10px] font-bold text-gray-400 uppercase tracking-wider mb-2">Expertise Needed</p>
                  <div className="flex flex-wrap gap-1.5">
                    {(Array.isArray(opp.expertiseNeeded) ? opp.expertiseNeeded : [opp.expertiseNeeded]).filter(Boolean).map(e => <span key={e} className="text-xs bg-yellow-50 text-yellow-800 border border-yellow-200 px-2.5 py-1 rounded-full font-semibold">{e}</span>)}
                  </div>
                  {opp.expertiseOther && <p className="text-xs text-gray-500 mt-1.5">+ {opp.expertiseOther}</p>}
                  {opp.copywritingRequirement && <p className="text-xs text-gray-600 mt-1.5">Copywriting: <strong>{opp.copywritingRequirement}</strong></p>}
                  {opp.emailProductionRequirement && <p className="text-xs text-gray-600 mt-0.5">Email Production: <strong>{opp.emailProductionRequirement}</strong></p>}
                </div>
              )}

              {/* Narrative fields */}
              <Block label="Problem Statement" value={opp.problemStatement} />
              <Block label="Success Definition" value={opp.successDefinition} />
              <Block label="Scope of Work" value={opp.scopeOfWork} />

              {/* Call recordings */}
              {(opp.discoveryCallUrl || opp.onboardingCallUrl) && (
                <div className="bg-gray-50 rounded-xl p-4 space-y-2">
                  <p className="text-[10px] font-bold text-gray-400 uppercase tracking-wider">Call Recordings</p>
                  {opp.discoveryCallUrl && <a href={opp.discoveryCallUrl} target="_blank" rel="noreferrer" className="block text-xs text-blue-600 hover:underline truncate">&#128249; Discovery Call</a>}
                  {opp.onboardingCallUrl && <a href={opp.onboardingCallUrl} target="_blank" rel="noreferrer" className="block text-xs text-blue-600 hover:underline truncate">&#128249; Onboarding Call</a>}
                </div>
              )}

              {/* Notes */}
              <Block label="Sales Notes" value={opp.salesNotes} />
              <Block label="Ops Debrief Notes" value={opp.debriefNotes} />
              <Block label="Additional Notes" value={opp.additionalNotes} />

              {/* Timestamp */}
              <div className="text-xs text-gray-400 pt-1 space-y-0.5">
                {opp.created_at && <p>Added: {fmtDate(opp.created_at)}</p>}
                {opp.updated_at && <p>Last updated: {fmtDate(opp.updated_at)}{opp.updated_by ? ` \u00B7 by ${opp.updated_by}` : ""}</p>}
              </div>
            </div>

            {/* Footer */}
            {can.edit(role, opp, uid) && (
              <div className="px-5 py-4 border-t border-gray-100 bg-gray-50">
                <button onClick={onEdit} className="w-full py-2.5 bg-[#FFDD2F] text-[#1B1B1B] rounded-xl text-sm font-bold hover:bg-[#f5d000] transition-colors">Edit Opportunity</button>
              </div>
            )}
          </div>
        </div>
      );
    };

    // ── App root ──────────────────────────────────────────────────────────────
    function App() {
      const [session, setSession] = useState(undefined);
      const [userRole, setUserRole] = useState(null);
      const [roleLoad, setRoleLoad] = useState(false);
      const fetchRole = useCallback(async uid => {
        setRoleLoad(true);
        try { const { data } = await db.from("user_roles").select("role,full_name,email").eq("user_id", uid).single(); setUserRole(data || null); }
        catch { setUserRole(null); }
        setRoleLoad(false);
      }, []);
      useEffect(() => {
        db.auth.getSession().then(({ data: { session: s } }) => { setSession(s || null); if (s) fetchRole(s.user.id); });
        const { data: { subscription } } = db.auth.onAuthStateChange((_e, s) => { setSession(s || null); if (s) fetchRole(s.user.id); else setUserRole(null); });
        return () => subscription.unsubscribe();
      }, [fetchRole]);
      if (session === undefined || roleLoad) return <LoadingScreen />;
      if (!session) return <AuthPage />;
      if (!userRole) return <NoAccess onOut={() => db.auth.signOut()} email={session.user.email} />;
      return <Dashboard session={session} userRole={userRole} />;
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</body>

</html>
