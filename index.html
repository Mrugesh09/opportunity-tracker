<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Opportunity Tracker — Mavlers</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap"
    rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
  <style>
    * {
      font-family: 'Montserrat', sans-serif;
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #f5f5f5;
    }

    ::-webkit-scrollbar {
      width: 5px;
      height: 5px;
    }

    ::-webkit-scrollbar-track {
      background: #f1f1f1;
    }

    ::-webkit-scrollbar-thumb {
      background: #d1d1d1;
      border-radius: 3px;
    }

    .spin {
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useCallback, useMemo, useRef } = React;

    const SUPA_URL = "https://cwqsrkdqzmdtwhiyshre.supabase.co";
    const SUPA_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN3cXNya2Rxem1kdHdoaXlzaHJlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0MzE5NTcsImV4cCI6MjA5MDAwNzk1N30.OtoggcPrwOS8dDvWMm4p3wDD10ecHoZ3N2swRIPH0Zc";
    const EXTRACT_FN_URL = `${SUPA_URL}/functions/v1/extract-opportunity`;
    // Initialise pdf.js worker
    if (window.pdfjsLib) {
      window.pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
    }
    const db = supabase.createClient(SUPA_URL, SUPA_KEY, {
      auth: { flowType: 'implicit' }
    });

    const STAGES = ["New Lead", "Discovery", "Scoping", "Proposal Sent", "Negotiation", "Won", "Lost", "On Hold"];
    const STAGE_META = {
      "New Lead": { bg: "bg-gray-100", text: "text-gray-700", dot: "bg-gray-400", border: "border-gray-300" },
      "Discovery": { bg: "bg-blue-50", text: "text-blue-700", dot: "bg-blue-500", border: "border-blue-200" },
      "Scoping": { bg: "bg-yellow-50", text: "text-yellow-800", dot: "bg-yellow-500", border: "border-yellow-200" },
      "Proposal Sent": { bg: "bg-orange-50", text: "text-orange-700", dot: "bg-orange-500", border: "border-orange-200" },
      "Negotiation": { bg: "bg-purple-50", text: "text-purple-700", dot: "bg-purple-500", border: "border-purple-200" },
      "Won": { bg: "bg-green-50", text: "text-green-700", dot: "bg-green-500", border: "border-green-200" },
      "Lost": { bg: "bg-red-50", text: "text-red-700", dot: "bg-red-500", border: "border-red-200" },
      "On Hold": { bg: "bg-slate-100", text: "text-slate-600", dot: "bg-slate-400", border: "border-slate-200" },
    };
    const SOURCES = ["NBD", "Existing Client"];
    const PLATFORMS = ["Salesforce Marketing Cloud", "Braze", "Marketo", "HubSpot", "Klaviyo", "Iterable", "Bloomreach", "Customer.io", "Other"];
    const ENG_TYPES = ["Dedicated Resource", "Recurring Engagement", "Project-to-Project"];
    const EXPERTISE = ["Consulting / Strategy", "Campaign / Automation Management", "Design", "Copywriting", "Template Production", "CRM Migration"];
    const TIMEZONES = ["AU", "EU", "US", "Other"];
    const COPY_OPTS = ["AI-Driven", "AI + Human", "Highly Creative"];
    const EMAIL_OPTS = ["AI Generated Templates", "Drag & Drop Builder", "Custom HTML"];
    const MODAL_TABS = ["Client", "Engagement", "Problem", "Scope", "Decision", "Pipeline"];
    const ROLE_TYPES = ["Contractual", "Full-Time", "Part-Time", "Freelance"];
    const URGENCY_OPTS = ["Low", "Normal", "High", "Critical"];
    const HIRE_STATUS = ["Open", "Sourcing", "Interviewing", "Finalised", "Cancelled"];
    const CURRENCIES = ["USD", "AUD", "EUR"];
    const FX_TO_USD = { USD: 1.00, AUD: 0.65, EUR: 1.08 };

    const ROLE_META = {
      admin: { label: "Admin", bg: "bg-[#1B1B1B]", text: "text-[#FFDD2F]" },
      sales: { label: "Sales", bg: "bg-blue-600", text: "text-white" },
      growth: { label: "Growth", bg: "bg-emerald-600", text: "text-white" },
      marketing: { label: "Marketing", bg: "bg-teal-600", text: "text-white" },
      ops: { label: "Ops", bg: "bg-violet-600", text: "text-white" },
      ta: { label: "TA", bg: "bg-orange-500", text: "text-white" },
    };

    const can = {
      create: r => ["admin", "sales", "growth", "marketing"].includes(r),
      edit: (r, o, u) => r === "admin" || (["sales", "growth", "marketing"].includes(r) && o?.owner_id === u) || r === "ops",
      del: r => r === "admin",
      team: r => r === "admin",
      forwardTA: r => ["admin", "sales", "growth", "marketing"].includes(r),
    };

    // ── Database helpers ──────────────────────────────────────────────────────
    const dbO = {
      load: () => db.from("opportunities").select("*").order("created_at", { ascending: false }).then(({ data, error }) => { if (error) throw error; return data.map(r => ({ id: r.id, created_at: r.created_at, ...r.data })); }),
      add: data => db.from("opportunities").insert({ data }).select().single().then(({ data: r, error }) => { if (error) throw error; return { id: r.id, created_at: r.created_at, ...r.data }; }),
      upd: (id, d) => db.from("opportunities").update({ data: d }).eq("id", id).then(({ error }) => { if (error) throw error; }),
      del: id => db.from("opportunities").delete().eq("id", id).then(({ error }) => { if (error) throw error; }),
    };
    const dbT = {
      roles: () => db.from("user_roles").select("*").order("created_at").then(({ data, error }) => { if (error) throw error; return data; }),
      list: () => db.from("role_allowlist").select("*").order("created_at").then(({ data, error }) => { if (error) throw error; return data; }),
      add: (e, r, n) => db.from("role_allowlist").upsert({ email: e, role: r, full_name: n }, { onConflict: "email" }).then(({ error }) => { if (error) throw error; }),
      remove: id => db.from("role_allowlist").delete().eq("id", id).then(({ error }) => { if (error) throw error; }),
    };
    const dbH = {
      load: () => db.from("hiring_roles").select("*").order("created_at", { ascending: false }).then(({ data, error }) => { if (error) throw error; return data || []; }),
      add: d => db.from("hiring_roles").insert(d).select().single().then(({ data, error }) => { if (error) throw error; return data; }),
      upd: (id, d) => db.from("hiring_roles").update(d).eq("id", id).then(({ error }) => { if (error) throw error; }),
      updCandidate: (id, status, cand) => db.from("hiring_roles").update({ status, ...cand }).eq("id", id).then(({ error }) => { if (error) throw error; }),
      del: id => db.from("hiring_roles").delete().eq("id", id).then(({ error }) => { if (error) throw error; }),
    };
    const dbN = {
      load: () => db.from("notifications").select("*").order("created_at", { ascending: false }).limit(60).then(({ data, error }) => { if (error) throw error; return data || []; }),
      add: d => db.from("notifications").insert(d).then(({ error }) => { if (error) throw error; }),
      read: (id, arr) => db.from("notifications").update({ read_by: arr }).eq("id", id).then(() => { }),
    };
    const dbS = {
      get: k => db.from("app_settings").select("value").eq("key", k).maybeSingle().then(({ data }) => data?.value || ""),
      set: (k, v) => db.from("app_settings").upsert({ key: k, value: v, updated_at: new Date().toISOString() }, { onConflict: "key" }).then(({ error }) => { if (error) throw error; }),
    };

    // ── Utility ───────────────────────────────────────────────────────────────
    const fmtINR = n => { const v = Number(n) || 0; if (v >= 10000000) return `\u20B9${(v / 10000000).toFixed(1)}Cr`; if (v >= 100000) return `\u20B9${(v / 100000).toFixed(1)}L`; if (v >= 1000) return `\u20B9${(v / 1000).toFixed(0)}K`; return `\u20B9${v}`; };
    const fmtUSD = n => { const v = Number(n) || 0; if (v >= 1000000) return `$${(v / 1000000).toFixed(1)}M`; if (v >= 1000) return `$${(v / 1000).toFixed(0)}K`; return `$${v.toFixed(0)}`; };
    const toUSD = (amt, cur) => (Number(amt) || 0) * (FX_TO_USD[cur] || 1);
    const fmtCurr = (amt, cur) => { const v = Number(amt) || 0; const sym = { USD: "$", AUD: "A$", EUR: "\u20AC" }[cur] || "$"; if (v >= 1000000) return `${sym}${(v / 1000000).toFixed(1)}M`; if (v >= 1000) return `${sym}${(v / 1000).toFixed(0)}K`; return `${sym}${v.toFixed(0)}`; };
    const fmtDate = s => s ? new Date(s).toLocaleDateString("en-IN", { day: "numeric", month: "short", year: "2-digit" }) : "\u2014";
    const todayStr = () => new Date().toISOString().slice(0, 10);
    const fireWebhook = async (url, payload) => { if (!url) return; try { await fetch(url, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) }); } catch { } };

    // ── Shared UI ─────────────────────────────────────────────────────────────
    const Spinner = ({ sz = "w-6 h-6", c = "border-[#FFDD2F]" }) => <div className={`${sz} border-2 ${c} border-t-transparent rounded-full spin`} />;
    const StageBadge = ({ stage }) => { const m = STAGE_META[stage] || STAGE_META["New Lead"]; return <span className={`inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs font-semibold border ${m.bg} ${m.text} ${m.border}`}><span className={`w-1.5 h-1.5 rounded-full ${m.dot}`} />{stage || "New Lead"}</span>; };
    const RoleBadge = ({ role }) => { const m = ROLE_META[role] || { label: role, bg: "bg-gray-200", text: "text-gray-700" }; return <span className={`px-2.5 py-0.5 rounded-full text-xs font-bold uppercase tracking-wide ${m.bg} ${m.text}`}>{m.label}</span>; };
    const UrgencyBadge = ({ urgency }) => { const c = { Low: "bg-gray-100 text-gray-600", Normal: "bg-blue-50 text-blue-700", High: "bg-orange-50 text-orange-700", Critical: "bg-red-50 text-red-700" }; return <span className={`px-2 py-0.5 rounded-full text-xs font-bold ${c[urgency] || c.Normal}`}>{urgency || "Normal"}</span>; };
    const HireBadge = ({ status }) => { const c = { Open: "bg-green-50 text-green-700", Sourcing: "bg-blue-50 text-blue-700", Interviewing: "bg-purple-50 text-purple-700", Finalised: "bg-emerald-100 text-emerald-800", Cancelled: "bg-red-50 text-red-600" }; return <span className={`px-2 py-0.5 rounded-full text-xs font-bold ${c[status] || c.Open}`}>{status || "Open"}</span>; };

    const iCls = "w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-[#FFDD2F] focus:border-transparent";
    const dCls = "disabled:bg-gray-50 disabled:text-gray-400 disabled:cursor-not-allowed";
    const FLabel = ({ children, req }) => <label className="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1.5">{children}{req && <span className="text-red-400 ml-0.5">*</span>}</label>;
    const FInput = ({ value, onChange, placeholder, type = "text", required, disabled }) => <input type={type} value={value || ""} onChange={onChange} placeholder={placeholder} required={required} disabled={disabled} className={`${iCls} ${dCls}`} />;
    const FSel = ({ value, onChange, options, placeholder, disabled }) => <select value={value || ""} onChange={onChange} disabled={disabled} className={`${iCls} bg-white ${dCls}`}><option value="">{placeholder || "Select\u2026"}</option>{options.map(o => <option key={o} value={o}>{o}</option>)}</select>;
    const FTxt = ({ value, onChange, placeholder, rows = 3, disabled }) => <textarea value={value || ""} onChange={onChange} placeholder={placeholder} rows={rows} disabled={disabled} className={`${iCls} resize-none ${dCls}`} />;
    const Tog = ({ options, value, onChange, disabled }) => <div className="flex flex-wrap gap-1.5">{options.map(o => <button key={o} type="button" onClick={() => !disabled && onChange(o)} disabled={disabled} className={`text-xs px-3 py-1.5 rounded-full border font-semibold transition-all ${value === o ? "bg-[#1B1B1B] text-[#FFDD2F] border-[#1B1B1B]" : "bg-white text-gray-600 border-gray-200 hover:border-gray-400"} disabled:opacity-40`}>{o}</button>)}</div>;
    const MTog = ({ options, values = [], onChange, disabled }) => <div className="flex flex-wrap gap-1.5">{options.map(o => { const s = values.includes(o); return <button key={o} type="button" onClick={() => !disabled && onChange(s ? values.filter(v => v !== o) : [...values, o])} disabled={disabled} className={`text-xs px-3 py-1.5 rounded-full border font-semibold transition-all ${s ? "bg-[#FFDD2F] text-[#1B1B1B] border-[#FFDD2F]" : "bg-white text-gray-600 border-gray-200 hover:border-gray-400"} disabled:opacity-40`}>{o}</button>; })}</div>;
    const FSec = ({ title, children }) => <div className="rounded-xl border border-gray-100 bg-gray-50/60 p-4"><p className="text-xs font-bold text-gray-400 uppercase tracking-widest mb-3">{title}</p>{children}</div>;

    // ── Auth screens ──────────────────────────────────────────────────────────
    const LoadingScreen = () => (
      <div className="min-h-screen flex flex-col items-center justify-center bg-[#1B1B1B]">
        <img src="https://www.mavlers.com/images/MavlersLogo.svg" alt="Mavlers" className="h-9 mb-8 brightness-0 invert" />
        <Spinner sz="w-8 h-8" />
      </div>
    );

    const NoAccess = ({ onOut, email }) => (
      <div className="min-h-screen flex flex-col items-center justify-center bg-[#1B1B1B] px-4">
        <img src="https://www.mavlers.com/images/MavlersLogo.svg" alt="Mavlers" className="h-9 mb-8 brightness-0 invert" />
        <div className="bg-white rounded-2xl p-8 max-w-sm w-full text-center shadow-2xl">
          <div className="text-5xl mb-4">&#128274;</div>
          <h2 className="text-lg font-bold text-[#1B1B1B] mb-2">Access Not Granted</h2>
          <p className="text-sm text-gray-500 mb-1 font-semibold">{email}</p>
          <p className="text-xs text-gray-400 mb-6">is not on the access list. Contact your admin.</p>
          <button onClick={onOut} className="w-full py-2.5 rounded-xl text-sm font-bold bg-[#1B1B1B] text-[#FFDD2F] hover:bg-black transition-colors">Sign Out</button>
        </div>
      </div>
    );

    const AuthPage = () => {
      const [showEmail, setShowEmail] = useState(false);
      const [tab, setTab] = useState("login");
      const [email, setEmail] = useState("");
      const [pass, setPass] = useState("");
      const [busy, setBusy] = useState(false);
      const [err, setErr] = useState("");
      const [ok, setOk] = useState("");
      const sw = t => { setTab(t); setErr(""); setOk(""); };

      const signInWithGoogle = async () => {
        setErr(""); setBusy(true);
        try {
          const cleanUrl = window.location.origin + window.location.pathname;
          const { error } = await db.auth.signInWithOAuth({
            provider: 'google',
            options: { redirectTo: cleanUrl, queryParams: { hd: 'mavlers.com' } }
          });
          if (error) throw error;
        } catch (er) { setErr(er.message || "Google sign-in failed."); setBusy(false); }
      };

      const go = async e => {
        e.preventDefault(); setErr(""); setOk(""); setBusy(true);
        try {
          if (tab === "forgot") {
            const { error } = await db.auth.resetPasswordForEmail(email.trim(), { redirectTo: window.location.origin + window.location.pathname });
            if (error) throw error;
            setOk("Reset link sent! Check your inbox.");
          } else if (tab === "login") {
            const { error } = await db.auth.signInWithPassword({ email: email.trim(), password: pass });
            if (error) throw error;
          } else {
            const { error } = await db.auth.signUp({ email: email.trim(), password: pass, options: { emailRedirectTo: window.location.href } });
            if (error) throw error;
            setOk("Account created! You can now sign in."); sw("login");
          }
        } catch (er) { setErr(er.message || "Something went wrong."); }
        setBusy(false);
      };

      return (
        <div className="min-h-screen flex flex-col items-center justify-center bg-[#1B1B1B] px-4 py-10">
          <div className="w-full max-w-sm">
            <div className="text-center mb-8">
              <img src="https://www.mavlers.com/images/MavlersLogo.svg" alt="Mavlers" className="h-10 mx-auto mb-4 brightness-0 invert" />
              <p className="text-[#FFDD2F] text-xs font-bold tracking-[0.2em] uppercase">Opportunity Tracker</p>
            </div>
            <div className="bg-white rounded-2xl shadow-2xl p-6 space-y-4">
              {err && <p className="text-xs text-red-600 bg-red-50 rounded-lg px-3 py-2 border border-red-100">{err}</p>}
              {ok && <p className="text-xs text-green-700 bg-green-50 rounded-lg px-3 py-2 border border-green-100">{ok}</p>}

              {!showEmail ? (
                <>
                  <button onClick={signInWithGoogle} disabled={busy} className="w-full py-3 rounded-xl text-sm font-semibold bg-white border-2 border-gray-200 hover:border-gray-300 hover:bg-gray-50 disabled:opacity-60 flex items-center justify-center gap-3 transition-all shadow-sm">
                    {busy ? <><Spinner sz="w-4 h-4" c="border-gray-500" />Please wait&#8230;</> : <><svg className="w-5 h-5" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" /><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" /><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" /><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" /></svg>Sign in with Google</>}
                  </button>
                  <div className="relative"><div className="absolute inset-0 flex items-center"><div className="w-full border-t border-gray-100" /></div><div className="relative flex justify-center"><span className="bg-white px-3 text-xs text-gray-300">or</span></div></div>
                  <button type="button" onClick={() => setShowEmail(true)} className="w-full text-xs text-gray-400 hover:text-[#1B1B1B] text-center transition-colors">Sign in with email &amp; password</button>
                </>
              ) : (
                <>
                  {tab !== "forgot" && (
                    <div className="flex border-b border-gray-100 -mx-6 -mt-6 mb-2">
                      {[["login", "Sign In"], ["signup", "Sign Up"]].map(([t, l]) => (
                        <button key={t} onClick={() => sw(t)} className={`flex-1 py-3.5 text-sm font-bold transition-all ${tab === t ? "text-[#1B1B1B] border-b-2 border-[#FFDD2F] bg-[#FFFBEA]" : "text-gray-400 hover:text-gray-600"}`}>{l}</button>
                      ))}
                    </div>
                  )}
                  <form onSubmit={go} className="space-y-4">
                    {tab === "forgot" && <div className="text-center pb-1"><p className="font-bold text-[#1B1B1B]">Reset Password</p><p className="text-xs text-gray-400 mt-1">We'll email you a reset link.</p></div>}
                    <div><FLabel req>Email</FLabel><FInput type="email" value={email} onChange={e => setEmail(e.target.value)} placeholder="you@mavlers.com" required /></div>
                    {tab !== "forgot" && <div><FLabel req>Password</FLabel><FInput type="password" value={pass} onChange={e => setPass(e.target.value)} placeholder="&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;" required /></div>}
                    <button type="submit" disabled={busy} className="w-full py-3 rounded-xl text-sm font-bold bg-[#FFDD2F] text-[#1B1B1B] hover:bg-[#f5d000] disabled:opacity-60 flex items-center justify-center gap-2 transition-colors">
                      {busy ? <><Spinner sz="w-4 h-4" c="border-[#1B1B1B]" />Please wait&#8230;</> : tab === "login" ? "Sign In \u2192" : tab === "signup" ? "Create Account" : "Send Reset Link"}
                    </button>
                    {tab === "login" && <button type="button" onClick={() => sw("forgot")} className="w-full text-xs text-gray-400 hover:text-[#1B1B1B] text-center">Forgot password?</button>}
                    {tab === "forgot" && <button type="button" onClick={() => sw("login")} className="w-full text-xs text-gray-400 hover:text-[#1B1B1B] text-center">\u2190 Back to Sign In</button>}
                  </form>
                  <button type="button" onClick={() => { setShowEmail(false); setErr(""); setOk(""); }} className="w-full text-xs text-gray-400 hover:text-[#1B1B1B] text-center transition-colors">\u2190 Back to Google Sign-In</button>
                </>
              )}
            </div>
            <p className="text-center text-xs text-gray-500 mt-5">Only authorized Mavlers team members can access this tool.</p>
          </div>
        </div>
      );
    };

    // ── Stat card ─────────────────────────────────────────────────────────────
    const StatCard = ({ label, value, sub, hi }) => (
      <div className={`bg-white rounded-xl p-4 shadow-sm border hover:shadow-md transition-shadow ${hi ? "border-[#FFDD2F] border-2" : "border-gray-100"}`}>
        <p className="text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">{label}</p>
        <p className="text-2xl font-extrabold text-[#1B1B1B] leading-none">{value}</p>
        {sub && <p className="text-xs text-gray-400 mt-1.5 font-medium">{sub}</p>}
      </div>
    );

    // ── Blank form ────────────────────────────────────────────────────────────
    const blankForm = () => ({
      clientName: "", industry: "", clientSize: "", website: "", source: "",
      pocName: "", pocTitle: "", pocEmail: "", pocPhone: "",
      opportunityOwner: "", assignedToSales: "",
      opportunityCreationDate: todayStr(),
      engagementType: "", expertiseNeeded: [], expertiseOther: "",
      problemStatement: "", successDefinition: "",
      platforms: [],
      discoveryCallUrl: "", onboardingCallUrl: "",
      scopeOfWork: "", copywritingRequirement: "", emailProductionRequirement: "",
      budgetRange: "", estimatedHours: "", potentialMonthlyRevenue: "", revenueCurrency: "USD",
      projectCost: "", projectCostCurrency: "USD", projectTimeline: "",
      clientTimezone: "", supportWindow: "",
      stage: "New Lead", salesNotes: "", debriefNotes: "", additionalNotes: ""
    });

    // ── Opportunity modal ─────────────────────────────────────────────────────
    const OppModal = ({ editData, prefillData, userId, role, updatedBy, onClose, onSaved }) => {
      const ops = role === "ops";
      const isEdit = !!editData;
      const init = isEdit
        ? { ...blankForm(), ...editData, platforms: editData.platforms || (editData.primaryPlatform ? [editData.primaryPlatform] : []), expertiseOther: editData.expertiseOther || "" }
        : prefillData
          ? { ...blankForm(), ...prefillData, platforms: prefillData.platforms || [], expertiseNeeded: prefillData.expertiseNeeded || [], expertiseOther: prefillData.expertiseOther || "" }
          : blankForm();
      const [form, setForm] = useState(init);
      const [tab, setTab] = useState(ops ? 5 : 0);
      const [busy, setBusy] = useState(false);
      const [err, setErr] = useState("");
      const [teamMembers, setTeamMembers] = useState([]);
      useEffect(() => { dbT.list().then(l => setTeamMembers(l.map(m => m.full_name || m.email).filter(Boolean))).catch(() => { }); }, []);
      const f = k => e => setForm(p => ({ ...p, [k]: e.target.value }));
      const fv = k => v => setForm(p => ({ ...p, [k]: v }));
      const hasCopy = (form.expertiseNeeded || []).includes("Copywriting");
      const hasEml = (form.expertiseNeeded || []).includes("Template Production");
      const isP2P = form.engagementType === "Project-to-Project";
      const save = async () => {
        if (!ops && !form.clientName) { setErr("Client name is required."); setTab(0); return; }
        setBusy(true); setErr("");
        try {
          const pl = { ...form, primaryPlatform: (form.platforms || [])[0] || "", owner_id: isEdit ? (editData.owner_id || userId) : userId, updated_at: new Date().toISOString(), updated_by: updatedBy || userId };
          if (isEdit) { await dbO.upd(editData.id, pl); try { onSaved({ id: editData.id, created_at: editData.created_at, ...pl }); } catch (se) { console.error(se); } }
          else { const c = await dbO.add(pl); try { onSaved(c); } catch (se) { console.error(se); } }
          onClose();
        } catch (er) { setErr(er.message || "Save failed."); setBusy(false); }
      };
      const tabs = [
        <div key="c" className="space-y-4">
          <FSec title="Client Info"><div className="grid grid-cols-2 gap-3">
            <div className="col-span-2"><FLabel req={!ops}>Client / Company Name</FLabel><FInput value={form.clientName} onChange={f("clientName")} placeholder="e.g. Acme Corp" required={!ops} disabled={ops} /></div>
            <div><FLabel>Domain / Industry</FLabel><FInput value={form.industry} onChange={f("industry")} placeholder="e.g. E-commerce, Fintech" disabled={ops} /></div>
            <div><FLabel>Company Size</FLabel><FSel value={form.clientSize} onChange={f("clientSize")} options={["SMB", "Mid-Market", "Enterprise"]} disabled={ops} /></div>
            <div><FLabel>Website</FLabel><FInput value={form.website} onChange={f("website")} placeholder="https://" disabled={ops} /></div>
            <div><FLabel>Source</FLabel><FSel value={form.source} onChange={f("source")} options={SOURCES} placeholder="Select source" disabled={ops} /></div>
          </div></FSec>
          <FSec title="Point of Contact"><div className="grid grid-cols-2 gap-3">
            <div><FLabel>POC Name</FLabel><FInput value={form.pocName} onChange={f("pocName")} placeholder="e.g. Jane Doe" disabled={ops} /></div>
            <div><FLabel>POC Title</FLabel><FInput value={form.pocTitle} onChange={f("pocTitle")} placeholder="e.g. Head of Marketing" disabled={ops} /></div>
            <div><FLabel>POC Email</FLabel><FInput type="email" value={form.pocEmail} onChange={f("pocEmail")} placeholder="jane@company.com" disabled={ops} /></div>
            <div><FLabel>POC Phone</FLabel><FInput value={form.pocPhone} onChange={f("pocPhone")} placeholder="+91 \u2026" disabled={ops} /></div>
            <div><FLabel>Opportunity Owner (CSM)</FLabel>
              <select value={form.opportunityOwner || ""} onChange={f("opportunityOwner")} disabled={ops} className={`${iCls} bg-white ${dCls}`}>
                <option value="">Select team member\u2026</option>
                {teamMembers.map(m => <option key={m} value={m}>{m}</option>)}
                {form.opportunityOwner && !teamMembers.includes(form.opportunityOwner) && <option value={form.opportunityOwner}>{form.opportunityOwner}</option>}
              </select>
            </div>
            <div><FLabel>Assigned Sales</FLabel>
              <select value={form.assignedToSales || ""} onChange={f("assignedToSales")} disabled={ops} className={`${iCls} bg-white ${dCls}`}>
                <option value="">Select team member\u2026</option>
                {teamMembers.map(m => <option key={m} value={m}>{m}</option>)}
                {form.assignedToSales && !teamMembers.includes(form.assignedToSales) && <option value={form.assignedToSales}>{form.assignedToSales}</option>}
              </select>
            </div>
            <div><FLabel>Created Date</FLabel><FInput type="date" value={form.opportunityCreationDate} onChange={f("opportunityCreationDate")} disabled={ops} /></div>
          </div></FSec>
        </div>,
        <div key="e" className="space-y-4">
          <FSec title="Engagement Type"><p className="text-xs text-gray-400 mb-3">Select ONE.</p><Tog options={ENG_TYPES} value={form.engagementType} onChange={fv("engagementType")} disabled={ops} /></FSec>
          <FSec title="Expertise Needed"><p className="text-xs text-gray-400 mb-3">Select ALL that apply.</p><MTog options={EXPERTISE} values={form.expertiseNeeded} onChange={fv("expertiseNeeded")} disabled={ops} /><div className="mt-3"><FLabel>Other (specify)</FLabel><FInput value={form.expertiseOther} onChange={f("expertiseOther")} placeholder="Describe any additional expertise needed\u2026" disabled={ops} /></div></FSec>
        </div>,
        <div key="p" className="space-y-4">
          <FSec title="Problem Statement"><p className="text-xs text-gray-400 mb-3">Answer both questions.</p><div className="space-y-3">
            <div><FLabel>What challenge or gap is the client trying to solve?</FLabel><FTxt value={form.problemStatement} onChange={f("problemStatement")} rows={4} placeholder="e.g. Client has no in-house expertise\u2026" disabled={ops} /></div>
            <div><FLabel>What does success look like to the client?</FLabel><FTxt value={form.successDefinition} onChange={f("successDefinition")} rows={4} placeholder="e.g. Fully configured Braze instance\u2026" disabled={ops} /></div>
          </div></FSec>
        </div>,
        <div key="s" className="space-y-4">
          <FSec title="Platform & Technology"><p className="text-xs text-gray-400 mb-2">Select all platforms in scope.</p><MTog options={PLATFORMS} values={form.platforms || []} onChange={fv("platforms")} disabled={ops} /></FSec>
          <FSec title="Call Recordings"><div className="grid grid-cols-1 gap-3">
            <div><FLabel>Discovery Call Recording URL</FLabel><FInput value={form.discoveryCallUrl} onChange={f("discoveryCallUrl")} placeholder="https://drive.google.com/\u2026" disabled={ops} /></div>
            <div><FLabel>Onboarding Call Recording URL</FLabel><FInput value={form.onboardingCallUrl} onChange={f("onboardingCallUrl")} placeholder="https://drive.google.com/\u2026" disabled={ops} /></div>
          </div></FSec>
          <FSec title="Scope of Work"><FTxt value={form.scopeOfWork} onChange={f("scopeOfWork")} placeholder="List what Mavlers will own vs. what the client handles." rows={4} disabled={ops} /></FSec>
          {hasCopy && <FSec title="Copywriting Requirement"><p className="text-xs text-gray-400 mb-3">Select ONE.</p><Tog options={COPY_OPTS} value={form.copywritingRequirement} onChange={fv("copywritingRequirement")} disabled={ops} /></FSec>}
          {hasEml && <FSec title="Email Production Requirement"><p className="text-xs text-gray-400 mb-3">Select ONE.</p><Tog options={EMAIL_OPTS} value={form.emailProductionRequirement} onChange={fv("emailProductionRequirement")} disabled={ops} /></FSec>}
        </div>,
        <div key="d" className="space-y-4">
          <FSec title="Budget"><div><FLabel>Budget Range (if shared)</FLabel><FInput value={form.budgetRange} onChange={f("budgetRange")} placeholder="e.g. \u20B95\u20138L / month" disabled={ops} /></div></FSec>
          <FSec title="Commercial Details">
            {isP2P ? <div className="grid grid-cols-2 gap-3">
              <div className="col-span-2"><FLabel>Project Cost</FLabel><div className="flex gap-2"><FSel value={form.projectCostCurrency} onChange={f("projectCostCurrency")} options={CURRENCIES} disabled={ops} /><FInput type="number" value={form.projectCost} onChange={f("projectCost")} placeholder="e.g. 50000" disabled={ops} /></div>{form.projectCost && form.projectCostCurrency !== "USD" && <p className="text-[10px] text-gray-400 mt-1">≈ {fmtUSD(toUSD(form.projectCost, form.projectCostCurrency))} USD</p>}</div>
              <div className="col-span-2"><FLabel>Project Timeline</FLabel><FInput value={form.projectTimeline} onChange={f("projectTimeline")} placeholder="e.g. 6 weeks" disabled={ops} /></div>
            </div> : <div className="grid grid-cols-2 gap-3">
              <div><FLabel>Est. Hours / Month</FLabel><FInput type="number" value={form.estimatedHours} onChange={f("estimatedHours")} placeholder="e.g. 80" disabled={ops} /></div>
              <div><FLabel>Monthly Revenue</FLabel><div className="flex gap-2"><FSel value={form.revenueCurrency} onChange={f("revenueCurrency")} options={CURRENCIES} disabled={ops} /><FInput type="number" value={form.potentialMonthlyRevenue} onChange={f("potentialMonthlyRevenue")} placeholder="e.g. 5000" disabled={ops} /></div>{form.potentialMonthlyRevenue && form.revenueCurrency !== "USD" && <p className="text-[10px] text-gray-400 mt-1">≈ {fmtUSD(toUSD(form.potentialMonthlyRevenue, form.revenueCurrency))} USD</p>}</div>
            </div>}
            <div className="mt-3"><FLabel>Client Timezone</FLabel><Tog options={TIMEZONES} value={form.clientTimezone} onChange={fv("clientTimezone")} disabled={ops} /></div>
            <div className="mt-3"><FLabel>Support Window</FLabel><FInput value={form.supportWindow} onChange={f("supportWindow")} placeholder="e.g. 9 AM \u2013 5 PM AEST, Mon\u2013Fri" disabled={ops} /></div>
          </FSec>
        </div>,
        <div key="pp" className="space-y-4">
          <FSec title="Pipeline Stage"><div className="grid grid-cols-2 gap-2">
            {STAGES.map(s => { const m = STAGE_META[s]; const a = form.stage === s; return <button key={s} type="button" onClick={() => setForm(p => ({ ...p, stage: s }))} className={`text-xs px-3 py-2.5 rounded-xl border text-left flex items-center gap-2 font-semibold transition-all ${a ? `${m.bg} ${m.text} ${m.border} shadow-sm` : "bg-white text-gray-500 border-gray-200 hover:border-gray-300"}`}><span className={`w-2 h-2 rounded-full flex-shrink-0 ${m.dot}`} />{s}</button>; })}
          </div></FSec>
          <FSec title="Notes"><div className="space-y-3">
            <div><FLabel>Sales Notes</FLabel><FTxt value={form.salesNotes} onChange={f("salesNotes")} placeholder="Context and next steps for the Sales team\u2026" rows={3} /></div>
            <div><FLabel>Ops Debrief Notes</FLabel><FTxt value={form.debriefNotes} onChange={f("debriefNotes")} placeholder="Post-closure debrief for the Ops team\u2026" rows={3} /></div>
            <div><FLabel>Additional Notes</FLabel><FTxt value={form.additionalNotes} onChange={f("additionalNotes")} placeholder="Any other context\u2026" rows={3} /></div>
          </div></FSec>
        </div>,
      ];
      return (
        <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center bg-black/60 backdrop-blur-sm p-0 sm:p-4">
          <div className="bg-white w-full sm:max-w-lg rounded-t-2xl sm:rounded-2xl shadow-2xl flex flex-col max-h-[95vh] overflow-hidden">
            <div className="flex items-center justify-between px-5 py-4 bg-[#1B1B1B]">
              <div>
                <h2 className="text-sm font-bold text-white">{ops ? "Update Stage & Notes" : isEdit ? "Edit Opportunity" : "Add New Opportunity"}</h2>
                {!ops && <p className="text-xs text-gray-400 mt-0.5">Step {tab + 1}/{MODAL_TABS.length}: {MODAL_TABS[tab]}</p>}
              </div>
              <button onClick={onClose} className="w-7 h-7 flex items-center justify-center rounded-full bg-white/10 text-gray-300 hover:bg-white/20 hover:text-white text-xl leading-none transition-colors">&times;</button>
            </div>
            {!ops && <div className="flex border-b border-gray-100 bg-gray-50 px-1 overflow-x-auto">{MODAL_TABS.map((t, i) => <button key={t} onClick={() => setTab(i)} className={`px-4 py-2.5 text-xs font-bold whitespace-nowrap transition-colors flex-shrink-0 ${tab === i ? "text-[#1B1B1B] border-b-2 border-[#FFDD2F]" : "text-gray-400 hover:text-gray-600"}`}>{t}</button>)}</div>}
            <div className="flex-1 overflow-y-auto p-4">{tabs[tab]}</div>
            {err && <p className="text-xs text-red-600 bg-red-50 px-5 py-2 border-t border-red-100">{err}</p>}
            <div className="flex gap-2 px-5 py-4 border-t border-gray-100 bg-gray-50">
              <button onClick={onClose} className="py-2.5 px-4 border border-gray-200 rounded-xl text-sm font-semibold text-gray-600 hover:bg-white transition-colors">Cancel</button>
              {!ops && tab > 0 && <button type="button" onClick={() => setTab(t => t - 1)} className="py-2.5 px-4 border border-gray-200 rounded-xl text-sm font-semibold text-gray-600 hover:bg-white transition-colors">\u2190 Back</button>}
              <div className="flex-1" />
              {!ops && tab < MODAL_TABS.length - 1
                ? <button type="button" onClick={() => setTab(t => t + 1)} className="py-2.5 px-5 bg-[#FFDD2F] text-[#1B1B1B] rounded-xl text-sm font-bold hover:bg-[#f5d000] transition-colors">Next \u2192</button>
                : <button type="button" onClick={save} disabled={busy} className="py-2.5 px-5 bg-[#1B1B1B] text-[#FFDD2F] rounded-xl text-sm font-bold hover:bg-black disabled:opacity-60 flex items-center gap-2 transition-colors">{busy ? <><Spinner sz="w-4 h-4" />Saving\u2026</> : isEdit ? "Save Changes" : "Add Opportunity"}</button>
              }
            </div>
          </div>
        </div>
      );
    };

    // ── Stage dropdown ────────────────────────────────────────────────────────
    const StageDropdown = ({ currentStage, onSelect, onClose }) => {
      const ref = useRef(null);
      useEffect(() => { const h = e => { if (ref.current && !ref.current.contains(e.target)) onClose(); }; document.addEventListener("mousedown", h); return () => document.removeEventListener("mousedown", h); }, [onClose]);
      return (
        <div ref={ref} className="absolute z-50 top-full left-0 mt-1 bg-white rounded-xl border border-gray-200 shadow-xl py-1 min-w-[160px]">
          <p className="px-3 py-1.5 text-xs font-bold text-gray-400 uppercase tracking-wider border-b border-gray-100 mb-1">Change Stage</p>
          {STAGES.map(s => {
            const m = STAGE_META[s]; const active = s === currentStage; return (
              <button key={s} onClick={() => onSelect(s)} className={`w-full text-left px-3 py-1.5 text-xs font-semibold flex items-center gap-2 transition-colors ${active ? "bg-[#FFFBEA] text-[#1B1B1B]" : "text-gray-600 hover:bg-gray-50"}`}>
                <span className={`w-2 h-2 rounded-full flex-shrink-0 ${m.dot}`} />{s}
                {active && <span className="ml-auto text-[#FFDD2F]">&#10003;</span>}
              </button>
            );
          })}
        </div>
      );
    };

    // ── Notification Bell ─────────────────────────────────────────────────────
    const NotificationBell = ({ userId }) => {
      const [notifs, setNotifs] = useState([]);
      const [open, setOpen] = useState(false);
      const ref = useRef(null);
      const load = useCallback(async () => { try { const d = await dbN.load(); setNotifs(d); } catch { } }, []);
      useEffect(() => { load(); }, [load]);
      useEffect(() => { const h = e => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); }; document.addEventListener("mousedown", h); return () => document.removeEventListener("mousedown", h); }, []);
      const unread = notifs.filter(n => !(n.read_by || []).includes(userId)).length;
      const markOneRead = async n => {
        if ((n.read_by || []).includes(userId)) return;
        const arr = [...(n.read_by || []), userId];
        try { await dbN.read(n.id, arr); setNotifs(prev => prev.map(x => x.id === n.id ? { ...x, read_by: arr } : x)); } catch { }
      };
      const markAllRead = async () => {
        const unreadItems = notifs.filter(n => !(n.read_by || []).includes(userId));
        for (const n of unreadItems) { const arr = [...(n.read_by || []), userId]; await dbN.read(n.id, arr); }
        setNotifs(prev => prev.map(n => { const arr = [...(n.read_by || [])]; if (!arr.includes(userId)) arr.push(userId); return { ...n, read_by: arr }; }));
      };
      const icon = t => t === "opp_won" ? "&#127942;" : t === "opp_added" ? "&#10024;" : t === "hiring_forwarded" ? "&#127919;" : "&#128260;";
      return (
        <div ref={ref} className="relative">
          <button onClick={() => setOpen(o => !o)} className="relative w-8 h-8 flex items-center justify-center rounded-full bg-white/10 hover:bg-white/20 text-white transition-colors text-lg">
            &#128276;
            {unread > 0 && <span className="absolute -top-0.5 -right-0.5 w-4 h-4 bg-[#FFDD2F] text-[#1B1B1B] text-[9px] font-extrabold rounded-full flex items-center justify-center">{unread > 9 ? "9+" : unread}</span>}
          </button>
          {open && (
            <div className="absolute right-0 top-10 w-80 bg-white rounded-2xl border border-gray-100 shadow-2xl overflow-hidden z-50">
              <div className="px-4 py-3 bg-[#1B1B1B] flex items-center justify-between">
                <p className="text-xs font-bold text-white">Notifications {unread > 0 && <span className="text-[#FFDD2F]">({unread} new)</span>}</p>
                <div className="flex items-center gap-3">
                  {unread > 0 && <button onClick={markAllRead} className="text-xs text-gray-400 hover:text-[#FFDD2F] transition-colors">Mark all read</button>}
                  <button onClick={load} className="text-xs text-gray-400 hover:text-[#FFDD2F] transition-colors">&#8635;</button>
                </div>
              </div>
              {notifs.length === 0
                ? <p className="text-xs text-gray-400 text-center py-8">No notifications yet</p>
                : <div className="max-h-72 overflow-y-auto divide-y divide-gray-50">
                  {notifs.map(n => {
                    const read = (n.read_by || []).includes(userId); return (
                      <div key={n.id} onClick={() => markOneRead(n)} className={`px-4 py-3 transition-colors ${read ? "hover:bg-gray-50" : "bg-[#FFFBEA] hover:bg-yellow-100 cursor-pointer"}`}>
                        <div className="flex items-start gap-2">
                          <span className="text-base flex-shrink-0 mt-0.5" dangerouslySetInnerHTML={{ __html: icon(n.type) }} />
                          <div className="flex-1 min-w-0">
                            <p className={`text-xs leading-snug ${read ? "text-gray-500" : "text-gray-800 font-semibold"}`}>{n.message}</p>
                            <p className="text-[10px] text-gray-400 mt-1">{fmtDate(n.created_at)}</p>
                          </div>
                          {!read && <div className="w-2 h-2 bg-[#FFDD2F] rounded-full flex-shrink-0 mt-1" />}
                        </div>
                      </div>
                    );
                  })}
                </div>
              }
            </div>
          )}
        </div>
      );
    };

    // ── Forward to TA modal ───────────────────────────────────────────────────
    const ForwardToTAModal = ({ opp, userEmail, userName, onClose, onForwarded }) => {
      const [form, setForm] = useState({ role_title: "", role_type: "Contractual", skills_required: "", experience_required: "", start_date: "", deadline: "", hiring_budget_inr: "", urgency: "Normal", notes: "" });
      const [busy, setBusy] = useState(false);
      const [err, setErr] = useState("");
      const f = k => e => setForm(p => ({ ...p, [k]: e.target.value }));
      const submit = async e => {
        e.preventDefault();
        if (!form.role_title) { setErr("Role title is required."); return; }
        setBusy(true); setErr("");
        try {
          await dbH.add({
            opportunity_id: opp.id, opp_client_name: opp.clientName || "Unnamed",
            role_title: form.role_title, role_type: form.role_type || "Contractual",
            skills_required: form.skills_required, experience_required: form.experience_required,
            start_date: form.start_date || null, deadline: form.deadline || null,
            hiring_budget_inr: Number(form.hiring_budget_inr) || null,
            urgency: form.urgency || "Normal", notes: form.notes,
            forwarded_by_email: userEmail, forwarded_by_name: userName, status: "Open",
          });
          await dbN.add({
            type: "hiring_forwarded",
            message: `\u{1F3AF} "${opp.clientName || "Unnamed"}" forwarded to TA \u2014 Role: ${form.role_title} (${form.role_type || "Contractual"}) | Urgency: ${form.urgency || "Normal"}`,
            opportunity_id: opp.id, opp_client_name: opp.clientName || "Unnamed",
            meta: { role_title: form.role_title, role_type: form.role_type, urgency: form.urgency },
          });
          onForwarded?.();
          onClose();
        } catch (er) { setErr(er.message || "Failed to forward."); setBusy(false); }
      };
      return (
        <div className="fixed inset-0 z-[60] flex items-end sm:items-center justify-center bg-black/70 backdrop-blur-sm p-0 sm:p-4">
          <div className="bg-white w-full sm:max-w-lg rounded-t-2xl sm:rounded-2xl shadow-2xl flex flex-col max-h-[95vh] overflow-hidden">
            <div className="flex items-center justify-between px-5 py-4 bg-orange-500">
              <div>
                <h2 className="text-sm font-bold text-white">&#127919; Forward to TA Team</h2>
                <p className="text-xs text-orange-100 mt-0.5">Opportunity: <strong>{opp.clientName || "Unnamed"}</strong></p>
              </div>
              <button onClick={onClose} className="w-7 h-7 flex items-center justify-center rounded-full bg-white/20 text-white hover:bg-white/30 text-xl leading-none">&times;</button>
            </div>
            <form onSubmit={submit} className="flex-1 overflow-y-auto p-4 space-y-4">
              <FSec title="Role Details">
                <div className="grid grid-cols-2 gap-3">
                  <div className="col-span-2"><FLabel req>Role / Position Title</FLabel><FInput value={form.role_title} onChange={f("role_title")} placeholder="e.g. Braze Campaign Specialist" required /></div>
                  <div><FLabel>Role Type</FLabel><FSel value={form.role_type} onChange={f("role_type")} options={ROLE_TYPES} /></div>
                  <div><FLabel>Urgency</FLabel><FSel value={form.urgency} onChange={f("urgency")} options={URGENCY_OPTS} /></div>
                  <div><FLabel>Start Date</FLabel><FInput type="date" value={form.start_date} onChange={f("start_date")} /></div>
                  <div><FLabel>Deadline to Fill</FLabel><FInput type="date" value={form.deadline} onChange={f("deadline")} /></div>
                </div>
              </FSec>
              <FSec title="Requirements">
                <div className="space-y-3">
                  <div><FLabel>Skills Required</FLabel><FTxt value={form.skills_required} onChange={f("skills_required")} placeholder="e.g. Braze, CRM automation, email template coding, Liquid scripting\u2026" rows={3} /></div>
                  <div><FLabel>Experience Required</FLabel><FInput value={form.experience_required} onChange={f("experience_required")} placeholder="e.g. 3\u20135 years in CRM / email marketing" /></div>
                </div>
              </FSec>
              <FSec title="Hiring Budget (TA Reference Only — Internal)">
                <div><FLabel>Budget (\u20B9 / month)</FLabel><FInput type="number" value={form.hiring_budget_inr} onChange={f("hiring_budget_inr")} placeholder="e.g. 80000" /></div>
                <p className="text-[10px] text-gray-400 mt-1.5">Internal hiring budget in INR. Client&apos;s commercial details are never shared with TA.</p>
              </FSec>
              <FSec title="Notes for TA">
                <FTxt value={form.notes} onChange={f("notes")} placeholder="Specific instructions, preferred profiles, cultural fit requirements\u2026" rows={3} />
              </FSec>
              {err && <p className="text-xs text-red-600 bg-red-50 rounded-lg px-3 py-2">{err}</p>}
            </form>
            <div className="flex gap-2 px-5 py-4 border-t border-gray-100 bg-gray-50">
              <button type="button" onClick={onClose} className="py-2.5 px-4 border border-gray-200 rounded-xl text-sm font-semibold text-gray-600 hover:bg-white transition-colors">Cancel</button>
              <div className="flex-1" />
              <button type="button" onClick={submit} disabled={busy} className="py-2.5 px-5 bg-orange-500 text-white rounded-xl text-sm font-bold hover:bg-orange-600 disabled:opacity-60 flex items-center gap-2 transition-colors">{busy ? <><Spinner sz="w-4 h-4" c="border-white" />Forwarding\u2026</> : "&#127919; Forward to TA"}</button>
            </div>
          </div>
        </div>
      );
    };

    // ── Candidate finalise modal ──────────────────────────────────────────────
    const CandidateModal = ({ item, onClose, onSaved }) => {
      const [form, setForm] = useState({ candidate_name: item.candidate_name || "", candidate_profile_url: item.candidate_profile_url || "", candidate_notes: item.candidate_notes || "" });
      const [busy, setBusy] = useState(false);
      const [err, setErr] = useState("");
      const f = k => e => setForm(p => ({ ...p, [k]: e.target.value }));
      const submit = async e => {
        e.preventDefault();
        if (!form.candidate_name) { setErr("Candidate name is required."); return; }
        setBusy(true); setErr("");
        try { await dbH.updCandidate(item.id, "Finalised", form); onSaved({ ...item, status: "Finalised", ...form }); onClose(); }
        catch (er) { setErr(er.message || "Save failed."); setBusy(false); }
      };
      return (
        <div className="fixed inset-0 z-[70] flex items-center justify-center bg-black/60 backdrop-blur-sm p-4">
          <div className="bg-white w-full max-w-md rounded-2xl shadow-2xl overflow-hidden">
            <div className="flex items-center justify-between px-5 py-4 bg-emerald-600">
              <div><h2 className="text-sm font-bold text-white">&#127942; Mark as Finalised</h2><p className="text-xs text-emerald-100 mt-0.5">{item.role_title} &mdash; {item.opp_client_name}</p></div>
              <button onClick={onClose} className="w-7 h-7 flex items-center justify-center rounded-full bg-white/20 text-white hover:bg-white/30 text-xl leading-none">&times;</button>
            </div>
            <form onSubmit={submit} className="p-5 space-y-4">
              <div><FLabel req>Selected Candidate Name</FLabel><FInput value={form.candidate_name} onChange={f("candidate_name")} placeholder="e.g. Priya Mehta" required /></div>
              <div><FLabel>LinkedIn / Profile URL</FLabel><FInput value={form.candidate_profile_url} onChange={f("candidate_profile_url")} placeholder="https://linkedin.com/in/&#8230;" /></div>
              <div><FLabel>Notes</FLabel><FTxt value={form.candidate_notes} onChange={f("candidate_notes")} placeholder="Offer details, joining date, special conditions&#8230;" rows={3} /></div>
              {err && <p className="text-xs text-red-600 bg-red-50 rounded-lg px-3 py-2">{err}</p>}
              <div className="flex gap-2 pt-1">
                <button type="button" onClick={onClose} className="py-2.5 px-4 border border-gray-200 rounded-xl text-sm font-semibold text-gray-600 hover:bg-gray-50 transition-colors">Cancel</button>
                <div className="flex-1" />
                <button type="submit" disabled={busy} className="py-2.5 px-5 bg-emerald-600 text-white rounded-xl text-sm font-bold hover:bg-emerald-700 disabled:opacity-60 flex items-center gap-2 transition-colors">{busy ? <><Spinner sz="w-4 h-4" c="border-white" />Saving&#8230;</> : "&#127942; Confirm Finalised"}</button>
              </div>
            </form>
          </div>
        </div>
      );
    };

    // ── Upload & Extract Opportunity Modal ───────────────────────────────────
    const UPLOAD_FIELD_GROUPS = [
      {
        title: "Client Info", fields: [
          { key: "clientName", label: "Client / Company Name" },
          { key: "industry", label: "Industry / Domain" },
          { key: "clientSize", label: "Company Size" },
          { key: "website", label: "Website" },
          { key: "source", label: "Source" },
        ]
      },
      {
        title: "Point of Contact", fields: [
          { key: "pocName", label: "POC Name" },
          { key: "pocTitle", label: "POC Title" },
          { key: "pocEmail", label: "POC Email" },
          { key: "pocPhone", label: "POC Phone" },
        ]
      },
      {
        title: "Engagement", fields: [
          { key: "engagementType", label: "Engagement Type" },
          { key: "platforms", label: "Platform(s)", isArray: true },
          { key: "expertiseNeeded", label: "Expertise Needed", isArray: true },
          { key: "clientTimezone", label: "Client Timezone" },
        ]
      },
      {
        title: "Commercial", fields: [
          { key: "budgetRange", label: "Budget Range" },
          { key: "potentialMonthlyRevenue", label: "Monthly Revenue" },
          { key: "revenueCurrency", label: "Revenue Currency" },
          { key: "projectCost", label: "Project Cost" },
          { key: "projectCostCurrency", label: "Project Cost Currency" },
          { key: "projectTimeline", label: "Project Timeline" },
        ]
      },
      {
        title: "Notes & Context", fields: [
          { key: "problemStatement", label: "Problem Statement" },
          { key: "successDefinition", label: "Success Definition" },
          { key: "scopeOfWork", label: "Scope of Work" },
          { key: "salesNotes", label: "Sales Notes" },
        ]
      },
    ];

    const UploadModal = ({ onClose, onApply }) => {
      const [step, setStep] = useState("upload"); // upload | extracting | review
      const [file, setFile] = useState(null);
      const [fields, setFields] = useState({});
      const [selected, setSelected] = useState({});
      const [error, setError] = useState("");
      const [dragOver, setDragOver] = useState(false);
      const fileRef = useRef(null);

      const extractText = async f => {
        const ext = f.name.split(".").pop().toLowerCase();
        if (ext === "pdf") {
          if (!window.pdfjsLib) throw new Error("PDF library not loaded yet \u2014 please refresh and try again.");
          const buf = await f.arrayBuffer();
          const pdf = await window.pdfjsLib.getDocument({ data: buf }).promise;
          const limit = Math.min(pdf.numPages, 15);
          let txt = "";
          for (let i = 1; i <= limit; i++) {
            const pg = await pdf.getPage(i);
            const ct = await pg.getTextContent();
            txt += ct.items.map(x => x.str).join(" ") + "\n";
          }
          return txt;
        } else if (ext === "docx" || ext === "doc") {
          if (!window.mammoth) throw new Error("DOCX library not loaded yet \u2014 please refresh and try again.");
          const buf = await f.arrayBuffer();
          const res = await window.mammoth.extractRawText({ arrayBuffer: buf });
          return res.value;
        } else if (ext === "txt") {
          return await f.text();
        } else {
          throw new Error(`Unsupported file type (.${ext}). Please use PDF, DOCX, or TXT.`);
        }
      };

      const processFile = async f => {
        setFile(f); setError(""); setStep("extracting");
        try {
          const text = await extractText(f);
          if (!text || text.trim().length < 30) throw new Error("Could not extract readable text from this file.");
          const res = await fetch(EXTRACT_FN_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json", "apikey": SUPA_KEY },
            body: JSON.stringify({ text }),
          });
          const json = await res.json();
          if (!res.ok || json.error) throw new Error(json.error || "Extraction failed.");
          const nonNull = Object.fromEntries(Object.entries(json.fields).filter(([, v]) => v !== null && v !== undefined && v !== "" && !(Array.isArray(v) && v.length === 0)));
          setFields(nonNull);
          setSelected(Object.fromEntries(Object.keys(nonNull).map(k => [k, true])));
          setStep("review");
        } catch (er) {
          setError(er.message); setStep("upload");
        }
      };

      const handleDrop = e => { e.preventDefault(); setDragOver(false); const f = e.dataTransfer.files[0]; if (f) processFile(f); };
      const handleFile = e => { const f = e.target.files[0]; if (f) processFile(f); };

      const foundCount = Object.keys(fields).length;
      const selectedCount = Object.values(selected).filter(Boolean).length;

      const applyFields = () => {
        const out = {};
        for (const [k, v] of Object.entries(fields)) { if (selected[k]) out[k] = v; }
        onApply(out); onClose();
      };

      return (
        <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center bg-black/60 backdrop-blur-sm p-0 sm:p-4">
          <div className="bg-white w-full sm:max-w-lg rounded-t-2xl sm:rounded-2xl shadow-2xl flex flex-col max-h-[90vh] overflow-hidden">
            {/* Header */}
            <div className="flex items-center justify-between px-5 py-4 bg-[#1B1B1B]">
              <div>
                <h2 className="text-sm font-bold text-white">&#128196; Upload Opportunity</h2>
                <p className="text-xs text-gray-400 mt-0.5">
                  {step === "review" ? `${foundCount} fields extracted \u00B7 ${selectedCount} selected` : "Upload a brief, proposal, or RFP"}
                </p>
              </div>
              <button onClick={onClose} className="w-7 h-7 flex items-center justify-center rounded-full bg-white/10 text-gray-300 hover:bg-white/20 hover:text-white text-xl leading-none">&times;</button>
            </div>

            {/* Step 1 — File pick */}
            {step === "upload" && (
              <div className="p-6 space-y-4">
                <div
                  onDragOver={e => { e.preventDefault(); setDragOver(true) }}
                  onDragLeave={() => setDragOver(false)}
                  onDrop={handleDrop}
                  onClick={() => fileRef.current?.click()}
                  className={`border-2 border-dashed rounded-2xl p-10 text-center cursor-pointer transition-all select-none ${dragOver ? "border-[#FFDD2F] bg-[#FFFBEA]" : "border-gray-200 hover:border-gray-300 hover:bg-gray-50"}`}
                >
                  <div className="text-5xl mb-3">&#128196;</div>
                  <p className="font-bold text-[#1B1B1B] text-sm">Drop your document here</p>
                  <p className="text-xs text-gray-400 mt-1">or click to browse</p>
                  <p className="text-[10px] text-gray-300 mt-3 uppercase tracking-widest">PDF &nbsp;&middot;&nbsp; DOCX &nbsp;&middot;&nbsp; TXT</p>
                  <input ref={fileRef} type="file" accept=".pdf,.docx,.doc,.txt" onChange={handleFile} className="hidden" />
                </div>
                {error && <p className="text-xs text-red-600 bg-red-50 rounded-lg px-3 py-2 border border-red-100">{error}</p>}
                <p className="text-[10px] text-gray-400 text-center">&#128274;&nbsp; The document is read locally &mdash; nothing is stored. Only extracted text is sent for AI analysis.</p>
              </div>
            )}

            {/* Step 2 — Extracting */}
            {step === "extracting" && (
              <div className="flex flex-col items-center justify-center p-16 gap-4">
                <Spinner sz="w-8 h-8" />
                <div className="text-center">
                  <p className="font-bold text-[#1B1B1B] text-sm">Analysing document&#8230;</p>
                  <p className="text-xs text-gray-400 mt-1 truncate max-w-xs">{file?.name}</p>
                  <p className="text-[10px] text-gray-300 mt-2">Extracting fields with AI &mdash; this takes 5&ndash;10 seconds</p>
                </div>
              </div>
            )}

            {/* Step 3 — Review */}
            {step === "review" && (
              <>
                <div className="flex-1 overflow-y-auto p-4 space-y-3">
                  <div className="flex items-center gap-2 bg-blue-50 border border-blue-100 rounded-xl px-3 py-2.5">
                    <span className="text-blue-500 text-base">&#9432;</span>
                    <p className="text-xs text-blue-700">Review extracted values. Uncheck anything you don&apos;t want applied. Editable text fields can be corrected inline.</p>
                  </div>
                  {UPLOAD_FIELD_GROUPS.map(group => {
                    const gf = group.fields.filter(f => fields[f.key] !== undefined && fields[f.key] !== null);
                    if (!gf.length) return null;
                    return (
                      <FSec key={group.title} title={group.title}>
                        <div className="space-y-3">
                          {gf.map(({ key, label, isArray }) => (
                            <div key={key} className="flex items-start gap-2.5">
                              <input type="checkbox" checked={!!selected[key]} onChange={e => setSelected(p => ({ ...p, [key]: e.target.checked }))}
                                className="mt-2 w-3.5 h-3.5 flex-shrink-0 accent-[#FFDD2F]" />
                              <div className="flex-1 min-w-0">
                                <p className="text-[10px] font-bold text-gray-400 uppercase tracking-wide mb-1">{label}</p>
                                {isArray
                                  ? <div className="flex flex-wrap gap-1">{(fields[key] || []).map(v => <span key={v} className="text-xs bg-yellow-50 text-yellow-800 border border-yellow-200 px-2 py-0.5 rounded-full font-semibold">{v}</span>)}</div>
                                  : <input type="text" value={String(fields[key] || "")} onChange={e => setFields(p => ({ ...p, [key]: e.target.value }))}
                                    className={`w-full text-xs px-2.5 py-1.5 border rounded-lg focus:outline-none focus:ring-2 focus:ring-[#FFDD2F] transition-colors ${selected[key] ? "border-gray-200 text-[#1B1B1B]" : "border-gray-100 text-gray-400"}`} />
                                }
                              </div>
                            </div>
                          ))}
                        </div>
                      </FSec>
                    );
                  })}
                  {foundCount === 0 && (
                    <div className="text-center py-8">
                      <p className="text-gray-500 font-semibold text-sm">No fields could be extracted</p>
                      <p className="text-gray-400 text-xs mt-1">The document may be image-based or have no readable text.</p>
                    </div>
                  )}
                </div>
                <div className="flex gap-2 px-5 py-4 border-t border-gray-100 bg-gray-50">
                  <button onClick={() => { setStep("upload"); setFields({}); setSelected({}); setError(""); }}
                    className="py-2.5 px-4 border border-gray-200 rounded-xl text-sm font-semibold text-gray-600 hover:bg-white transition-colors">
                    &#8592; Re-upload
                  </button>
                  <div className="flex-1" />
                  <button onClick={applyFields} disabled={selectedCount === 0}
                    className="py-2.5 px-5 bg-[#FFDD2F] text-[#1B1B1B] rounded-xl text-sm font-bold hover:bg-[#f5d000] disabled:opacity-40 transition-colors">
                    Fill Form ({selectedCount} fields) &#8594;
                  </button>
                </div>
              </>
            )}
          </div>
        </div>
      );
    };

    // ── Hiring Roles page ─────────────────────────────────────────────────────
    const HiringRolesPage = ({ role }) => {
      const isTA = role === "ta";
      const [items, setItems] = useState([]);
      const [loading, setLoad] = useState(true);
      const [search, setSearch] = useState("");
      const [fSt, setFSt] = useState("");
      const [fUr, setFUr] = useState("");
      const [updId, setUpdId] = useState(null);
      const [delId, setDelId] = useState(null);
      const [candModal, setCandModal] = useState(null);
      const isAdmin = role === "admin";
      useEffect(() => { dbH.load().then(d => { setItems(d); setLoad(false); }).catch(() => setLoad(false)); }, []);
      const handleDel = async id => {
        if (!confirm("Delete this hiring role? This cannot be undone.")) return;
        setDelId(id);
        try { await dbH.del(id); setItems(p => p.filter(x => x.id !== id)); } catch { }
        setDelId(null);
      };
      const filtered = useMemo(() => {
        let r = [...items];
        if (search) { const q = search.toLowerCase(); r = r.filter(i => [i.role_title, i.opp_client_name, i.role_type, i.skills_required, i.candidate_name].some(v => (v || "").toLowerCase().includes(q))); }
        if (fSt) r = r.filter(i => i.status === fSt);
        if (fUr) r = r.filter(i => i.urgency === fUr);
        return r;
      }, [items, search, fSt, fUr]);

      const upd = async (id, status) => {
        const item = items.find(x => x.id === id);
        if (status === "Finalised") {
          setCandModal(item);
          return;
        }
        setUpdId(id);
        try { await dbH.upd(id, { status }); setItems(p => p.map(x => x.id === id ? { ...x, status } : x)); } catch { }
        setUpdId(null);
      };

      const onCandSaved = updated => {
        setItems(p => p.map(x => x.id === updated.id ? updated : x));
      };

      if (loading) return <div className="flex justify-center p-12"><Spinner /></div>;
      return (
        <div className="flex-1 p-4 sm:p-6 max-w-7xl mx-auto w-full">
          <div className="grid grid-cols-2 lg:grid-cols-4 gap-3 mb-5">
            <StatCard label="Total Roles" value={items.length} />
            <StatCard label="Open" value={items.filter(i => i.status === "Open").length} hi />
            <StatCard label="In Progress" value={items.filter(i => ["Sourcing", "Interviewing"].includes(i.status)).length} />
            <StatCard label="Finalised" value={items.filter(i => i.status === "Finalised").length} />
          </div>
          <div className="bg-white rounded-xl border border-gray-100 shadow-sm p-3 mb-4">
            <div className="flex flex-wrap gap-2 items-center">
              <input value={search} onChange={e => setSearch(e.target.value)} placeholder="&#128269;  Search role, client, skills, candidate&#8230;" className="flex-1 min-w-36 px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-[#FFDD2F]" />
              <select value={fSt} onChange={e => setFSt(e.target.value)} className="px-3 py-2 border border-gray-200 rounded-lg text-sm bg-white focus:outline-none focus:ring-2 focus:ring-[#FFDD2F]"><option value="">All Status</option>{HIRE_STATUS.map(s => <option key={s} value={s}>{s}</option>)}</select>
              <select value={fUr} onChange={e => setFUr(e.target.value)} className="px-3 py-2 border border-gray-200 rounded-lg text-sm bg-white focus:outline-none focus:ring-2 focus:ring-[#FFDD2F]"><option value="">All Urgency</option>{URGENCY_OPTS.map(u => <option key={u} value={u}>{u}</option>)}</select>
              {(fSt || fUr || search) && <button onClick={() => { setSearch(""); setFSt(""); setFUr(""); }} className="px-3 py-2 text-xs font-semibold text-gray-400 hover:text-red-500 border border-gray-200 rounded-lg transition-colors">&#10005; Clear</button>}
            </div>
          </div>
          <div className="bg-white rounded-xl border border-gray-100 shadow-sm overflow-hidden">
            {filtered.length === 0
              ? <div className="text-center py-16"><div className="text-5xl mb-3">&#127919;</div><p className="text-gray-600 font-semibold">No hiring roles found</p><p className="text-gray-400 text-sm mt-1">Roles forwarded to TA will appear here.</p></div>
              : <div className="overflow-x-auto">
                <table className="w-full text-sm">
                  <thead>
                    <tr className="border-b border-gray-100 text-xs text-gray-400 font-bold uppercase tracking-wide bg-gray-50/80">
                      <th className="px-5 py-3 text-left">Role / Candidate</th>
                      <th className="px-4 py-3 text-left">Client</th>
                      <th className="px-4 py-3 text-left">Type</th>
                      <th className="px-4 py-3 text-left">Urgency</th>
                      <th className="px-4 py-3 text-left">Budget</th>
                      <th className="px-4 py-3 text-left">Deadline</th>
                      <th className="px-4 py-3 text-left">Status</th>
                      {!isTA && <th className="px-4 py-3 text-left hidden lg:table-cell">Forwarded By</th>}
                      <th className="px-4 py-3 text-left hidden xl:table-cell">Added</th>
                      {isTA && <th className="px-4 py-3 w-44">Update Stage</th>}
                      {isAdmin && <th className="px-4 py-3 w-16" />}
                    </tr>
                  </thead>
                  <tbody className="divide-y divide-gray-50">
                    {filtered.map(item => (
                      <tr key={item.id} className="hover:bg-[#FFFEF5] transition-colors">
                        <td className="px-5 py-3.5">
                          <p className="font-bold text-[#1B1B1B]">{item.role_title}</p>
                          {item.skills_required && <p className="text-xs text-gray-400 mt-0.5 max-w-[220px] truncate" title={item.skills_required}>{item.skills_required}</p>}
                          {item.experience_required && <p className="text-xs text-blue-400 mt-0.5">{item.experience_required}</p>}
                          {item.notes && <p className="text-xs text-gray-500 mt-1 max-w-[220px] truncate italic" title={item.notes}>Note: {item.notes}</p>}
                          {item.status === "Finalised" && item.candidate_name && (
                            <div className="mt-1.5 flex items-center gap-1.5 bg-emerald-50 rounded-lg px-2 py-1 border border-emerald-100">
                              <span className="text-emerald-700 text-xs">&#127942;</span>
                              {item.candidate_profile_url
                                ? <a href={item.candidate_profile_url} target="_blank" rel="noreferrer" className="text-xs font-semibold text-emerald-700 hover:underline" onClick={e => e.stopPropagation()}>{item.candidate_name}</a>
                                : <span className="text-xs font-semibold text-emerald-700">{item.candidate_name}</span>}
                            </div>
                          )}
                        </td>
                        <td className="px-4 py-3.5 font-semibold text-[#1B1B1B]">{item.opp_client_name || "\u2014"}</td>
                        <td className="px-4 py-3.5"><span className="text-xs bg-gray-100 text-gray-700 px-2 py-0.5 rounded-full font-semibold">{item.role_type || "Contractual"}</span></td>
                        <td className="px-4 py-3.5"><UrgencyBadge urgency={item.urgency} /></td>
                        <td className="px-4 py-3.5"><span className={`font-bold ${item.hiring_budget_inr ? "text-[#1B1B1B]" : "text-gray-300"}`}>{item.hiring_budget_inr ? fmtINR(item.hiring_budget_inr) : "\u2014"}</span></td>
                        <td className="px-4 py-3.5 text-gray-500 text-xs whitespace-nowrap">{item.deadline ? fmtDate(item.deadline) : "\u2014"}</td>
                        <td className="px-4 py-3.5">{updId === item.id ? <Spinner sz="w-4 h-4" c="border-gray-400" /> : <HireBadge status={item.status} />}</td>
                        {!isTA && <td className="px-4 py-3.5 text-gray-400 text-xs hidden lg:table-cell">{item.forwarded_by_name || item.forwarded_by_email || "\u2014"}</td>}
                        <td className="px-4 py-3.5 text-gray-400 text-xs hidden xl:table-cell whitespace-nowrap">{fmtDate(item.created_at)}</td>
                        {isTA && (
                          <td className="px-4 py-3.5">
                            <select value={item.status || "Open"} onChange={e => upd(item.id, e.target.value)} disabled={updId === item.id} className="text-xs border border-gray-200 rounded-lg px-2 py-1.5 bg-white focus:outline-none focus:ring-2 focus:ring-[#FFDD2F]">
                              {HIRE_STATUS.map(s => <option key={s} value={s}>{s}</option>)}
                            </select>
                          </td>
                        )}
                        {isAdmin && (
                          <td className="px-4 py-3.5">
                            <button onClick={() => handleDel(item.id)} disabled={delId === item.id} className="px-2 py-1 text-xs font-bold rounded-lg bg-gray-100 text-gray-400 hover:bg-red-50 hover:text-red-500 disabled:opacity-40 transition-colors" title="Delete role">{delId === item.id ? "&#8230;" : "&#10005;"}</button>
                          </td>
                        )}
                      </tr>
                    ))}
                  </tbody>
                </table>
                <div className="px-5 py-3 border-t border-gray-100 bg-gray-50/50">
                  <p className="text-xs text-gray-400 font-medium">Showing <strong className="text-[#1B1B1B]">{filtered.length}</strong> of <strong className="text-[#1B1B1B]">{items.length}</strong> roles</p>
                </div>
              </div>
            }
          </div>
          {candModal && <CandidateModal item={candModal} onClose={() => setCandModal(null)} onSaved={onCandSaved} />}
        </div>
      );
    };

    // ── Team page ─────────────────────────────────────────────────────────────
    const TeamPage = () => {
      const [list, setList] = useState([]);
      const [roles, setRoles] = useState([]);
      const [loading, setLoad] = useState(true);
      const [form, setForm] = useState({ email: "", role: "sales", full_name: "" });
      const [busy, setBusy] = useState(false);
      const [err, setErr] = useState("");
      const [ok, setOk] = useState("");
      const [webhook, setWebhook] = useState("");
      const [wbBusy, setWbBusy] = useState(false);
      const [wbOk, setWbOk] = useState("");
      useEffect(() => {
        Promise.all([dbT.list(), dbT.roles(), dbS.get("notification_webhook")])
          .then(([l, r, wh]) => { setList(l); setRoles(r); setWebhook(wh || ""); })
          .catch(() => { }).finally(() => setLoad(false));
      }, []);
      const add = async e => {
        e.preventDefault(); setBusy(true); setErr(""); setOk("");
        try {
          await dbT.add(form.email.toLowerCase().trim(), form.role, form.full_name.trim());
          const l = await dbT.list(); setList(l);
          setOk(`${form.email} added as ${form.role}. Share the app URL so they can sign up.`);
          setForm({ email: "", role: "sales", full_name: "" });
        } catch (er) { setErr(er.message || "Failed."); }
        setBusy(false);
      };
      const rm = async (id, email) => {
        if (!confirm(`Remove ${email}?`)) return;
        try { await dbT.remove(id); setList(l => l.filter(a => a.id !== id)); } catch (er) { setErr(er.message); }
      };
      const saveWH = async () => {
        setWbBusy(true); setWbOk("");
        try { await dbS.set("notification_webhook", webhook); setWbOk("Webhook URL saved!"); } catch { }
        setWbBusy(false);
      };
      if (loading) return <div className="flex justify-center p-12"><Spinner /></div>;
      return (
        <div className="max-w-2xl mx-auto p-4 sm:p-6 space-y-5">
          <div className="bg-white rounded-2xl border border-gray-100 shadow-sm p-5">
            <h3 className="text-sm font-bold text-[#1B1B1B] mb-4">Invite Team Member</h3>
            <form onSubmit={add} className="space-y-3">
              <div className="grid grid-cols-2 gap-3">
                <div><FLabel>Full Name</FLabel><FInput value={form.full_name} onChange={e => setForm(p => ({ ...p, full_name: e.target.value }))} placeholder="Anita Sharma" /></div>
                <div><FLabel req>Role</FLabel>
                  <select value={form.role} onChange={e => setForm(p => ({ ...p, role: e.target.value }))} className={`${iCls} bg-white`}>
                    <option value="sales">Sales</option>
                    <option value="growth">Growth</option>
                    <option value="marketing">Marketing</option>
                    <option value="ops">Ops</option>
                    <option value="ta">TA</option>
                    <option value="admin">Admin</option>
                  </select>
                </div>
              </div>
              <div><FLabel req>Work Email</FLabel><FInput type="email" value={form.email} onChange={e => setForm(p => ({ ...p, email: e.target.value }))} placeholder="name@mavlers.com" required /></div>
              {err && <p className="text-xs text-red-600 bg-red-50 rounded-lg px-3 py-2">{err}</p>}
              {ok && <p className="text-xs text-green-700 bg-green-50 rounded-lg px-3 py-2">{ok}</p>}
              <button type="submit" disabled={busy} className="w-full py-2.5 bg-[#FFDD2F] text-[#1B1B1B] rounded-xl text-sm font-bold hover:bg-[#f5d000] disabled:opacity-60 flex items-center justify-center gap-2 transition-colors">{busy ? <><Spinner sz="w-4 h-4" c="border-[#1B1B1B]" />Adding&#8230;</> : "+ Add to Access List"}</button>
            </form>
            <div className="mt-3 p-3 bg-[#FFFBEA] rounded-xl border border-[#FFDD2F]/40 text-xs text-gray-600"><strong>How it works:</strong> Add email here &#8594; share the app URL &#8594; they sign up &#8594; role is auto-assigned.</div>
          </div>

          <div className="bg-white rounded-2xl border border-gray-100 shadow-sm p-5">
            <h3 className="text-sm font-bold text-[#1B1B1B] mb-1">&#128276; Notification Settings</h3>
            <p className="text-xs text-gray-400 mb-4">Paste a webhook URL (Make, Zapier, n8n) to receive alerts via email or Google Space when opportunities are added, change stage, or are won.</p>
            <div className="space-y-2">
              <FLabel>Webhook URL</FLabel>
              <div className="flex gap-2">
                <input value={webhook} onChange={e => setWebhook(e.target.value)} placeholder="https://hook.make.com/&#8230;" className={`${iCls} flex-1`} />
                <button onClick={saveWH} disabled={wbBusy} className="px-4 py-2 bg-[#1B1B1B] text-[#FFDD2F] rounded-lg text-xs font-bold hover:bg-black disabled:opacity-60 whitespace-nowrap transition-colors">{wbBusy ? "Saving&#8230;" : "Save"}</button>
              </div>
              {wbOk && <p className="text-xs text-green-700">{wbOk}</p>}
              <p className="text-[10px] text-gray-400">Payload includes: event type, client name, stage, timestamp. Google Space: add an incoming webhook to your Space and paste the URL here.</p>
            </div>
          </div>

          <div className="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden">
            <div className="px-5 py-4 border-b border-gray-100">
              <h3 className="text-sm font-bold text-[#1B1B1B]">Access List <span className="text-gray-400 font-normal">({list.length})</span></h3>
              <p className="text-xs text-gray-400 mt-0.5">Pre-approved emails. Green dot = signed up.</p>
            </div>
            {list.length === 0
              ? <p className="text-sm text-gray-400 text-center py-10">No members added yet.</p>
              : <div className="divide-y divide-gray-50">{list.map(a => {
                const active = roles.find(r => r.email === a.email); return (
                  <div key={a.id} className="flex items-center justify-between px-5 py-3.5 hover:bg-gray-50 transition-colors">
