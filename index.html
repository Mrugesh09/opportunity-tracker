<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Opportunity Tracker — Mavlers</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { font-family: 'Montserrat', sans-serif; box-sizing: border-box; }
    body { margin: 0; background: #f5f5f5; }
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: #f1f1f1; }
    ::-webkit-scrollbar-thumb { background: #d1d1d1; border-radius: 3px; }
    .spin { animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useCallback, useMemo, useRef } = React;

    const SUPA_URL = "https://cwqsrkdqzmdtwhiyshre.supabase.co";
    const SUPA_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN3cXNya2Rxem1kdHdoaXlzaHJlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0MzE5NTcsImV4cCI6MjA5MDAwNzk1N30.OtoggcPrwOS8dDvWMm4p3wDD10ecHoZ3N2swRIPH0Zc";
    const db = supabase.createClient(SUPA_URL, SUPA_KEY);

    const STAGES = ["New Lead","Discovery","Scoping","Proposal Sent","Negotiation","Won","Lost","On Hold"];
    const STAGE_META = {
      "New Lead":      {bg:"bg-gray-100",    text:"text-gray-700",   dot:"bg-gray-400",   border:"border-gray-300"  },
      "Discovery":     {bg:"bg-blue-50",     text:"text-blue-700",   dot:"bg-blue-500",   border:"border-blue-200"  },
      "Scoping":       {bg:"bg-yellow-50",   text:"text-yellow-800", dot:"bg-yellow-500", border:"border-yellow-200"},
      "Proposal Sent": {bg:"bg-orange-50",   text:"text-orange-700", dot:"bg-orange-500", border:"border-orange-200"},
      "Negotiation":   {bg:"bg-purple-50",   text:"text-purple-700", dot:"bg-purple-500", border:"border-purple-200"},
      "Won":           {bg:"bg-green-50",    text:"text-green-700",  dot:"bg-green-500",  border:"border-green-200" },
      "Lost":          {bg:"bg-red-50",      text:"text-red-700",    dot:"bg-red-500",    border:"border-red-200"   },
      "On Hold":       {bg:"bg-slate-100",   text:"text-slate-600",  dot:"bg-slate-400",  border:"border-slate-200" },
    };
    const SOURCES       = ["NBD","Existing Client"];
    const PLATFORMS     = ["Salesforce Marketing Cloud","Braze","Marketo","HubSpot","Klaviyo","Iterable","Bloomreach","Customer.io","Other"];
    const ENG_TYPES     = ["Dedicated Resource","Recurring Engagement","Project-to-Project"];
    const EXPERTISE     = ["Consulting / Strategy","Campaign / Automation Management","Design","Copywriting","Template Production","CRM Migration"];
    const TIMEZONES     = ["AU","EU","US","Other"];
    const COPY_OPTS     = ["AI-Driven","AI + Human","Highly Creative"];
    const EMAIL_OPTS    = ["AI Generated Templates","Drag & Drop Builder","Custom HTML"];
    const MODAL_TABS    = ["Client","Engagement","Problem","Scope","Decision","Pipeline"];
    const ROLE_META     = {
      admin:  {label:"Admin",  bg:"bg-[#1B1B1B]",   text:"text-[#FFDD2F]"},
      sales:  {label:"Sales",  bg:"bg-blue-600",     text:"text-white"    },
      growth: {label:"Growth", bg:"bg-emerald-600",  text:"text-white"    },
      ops:    {label:"Ops",    bg:"bg-violet-600",   text:"text-white"    },
    };

    const can = {
      create: (r)       => ["admin","sales","growth"].includes(r),
      edit:   (r,o,uid) => r==="admin" || (["sales","growth"].includes(r) && o?.owner_id===uid) || r==="ops",
      del:    (r,o,uid) => r==="admin" || (["sales","growth"].includes(r) && o?.owner_id===uid),
      team:   (r)       => r==="admin",
    };

    const dbO = {
      load: ()      => db.from("opportunities").select("*").order("created_at",{ascending:false}).then(({data,error})=>{ if(error) throw error; return data.map(r=>({id:r.id,created_at:r.created_at,...r.data})); }),
      add:  (data)  => db.from("opportunities").insert({data}).select().single().then(({data:r,error})=>{ if(error) throw error; return {id:r.id,created_at:r.created_at,...r.data}; }),
      upd:  (id,d)  => db.from("opportunities").update({data:d}).eq("id",id).then(({error})=>{ if(error) throw error; }),
      del:  (id)    => db.from("opportunities").delete().eq("id",id).then(({error})=>{ if(error) throw error; }),
    };
    const dbT = {
      roles:  ()           => db.from("user_roles").select("*").order("created_at").then(({data,error})=>{ if(error) throw error; return data; }),
      list:   ()           => db.from("role_allowlist").select("*").order("created_at").then(({data,error})=>{ if(error) throw error; return data; }),
      add:    (e,r,n)      => db.from("role_allowlist").insert({email:e,role:r,full_name:n}).then(({error})=>{ if(error) throw error; }),
      remove: (id)         => db.from("role_allowlist").delete().eq("id",id).then(({error})=>{ if(error) throw error; }),
    };

    const fmtINR = n => { const v=Number(n)||0; if(v>=10000000) return `₹${(v/10000000).toFixed(1)}Cr`; if(v>=100000) return `₹${(v/100000).toFixed(1)}L`; if(v>=1000) return `₹${(v/1000).toFixed(0)}K`; return `₹${v}`; };
    const fmtDate = s => s ? new Date(s).toLocaleDateString("en-IN",{day:"numeric",month:"short",year:"2-digit"}) : "—";
    const todayStr = () => new Date().toISOString().slice(0,10);

    const Spinner = ({sz="w-6 h-6",c="border-[#FFDD2F]"}) => <div className={`${sz} border-2 ${c} border-t-transparent rounded-full spin`} />;
    const StageBadge = ({stage}) => { const m=STAGE_META[stage]||STAGE_META["New Lead"]; return <span className={`inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs font-semibold border ${m.bg} ${m.text} ${m.border}`}><span className={`w-1.5 h-1.5 rounded-full ${m.dot}`}/>{stage||"New Lead"}</span>; };
    const RoleBadge = ({role}) => { const m=ROLE_META[role]||{label:role,bg:"bg-gray-200",text:"text-gray-700"}; return <span className={`px-2.5 py-0.5 rounded-full text-xs font-bold uppercase tracking-wide ${m.bg} ${m.text}`}>{m.label}</span>; };

    const iCls = "w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-[#FFDD2F] focus:border-transparent";
    const dCls = "disabled:bg-gray-50 disabled:text-gray-400 disabled:cursor-not-allowed";
    const FLabel = ({children,req}) => <label className="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1.5">{children}{req&&<span className="text-red-400 ml-0.5">*</span>}</label>;
    const FInput = ({value,onChange,placeholder,type="text",required,disabled}) => <input type={type} value={value||""} onChange={onChange} placeholder={placeholder} required={required} disabled={disabled} className={`${iCls} ${dCls}`}/>;
    const FSel = ({value,onChange,options,placeholder,disabled}) => <select value={value||""} onChange={onChange} disabled={disabled} className={`${iCls} bg-white ${dCls}`}><option value="">{placeholder||"Select…"}</option>{options.map(o=><option key={o} value={o}>{o}</option>)}</select>;
    const FTxt = ({value,onChange,placeholder,rows=3,disabled}) => <textarea value={value||""} onChange={onChange} placeholder={placeholder} rows={rows} disabled={disabled} className={`${iCls} resize-none ${dCls}`}/>;
    const Tog = ({options,value,onChange,disabled}) => <div className="flex flex-wrap gap-1.5">{options.map(o=><button key={o} type="button" onClick={()=>!disabled&&onChange(o)} disabled={disabled} className={`text-xs px-3 py-1.5 rounded-full border font-semibold transition-all ${value===o?"bg-[#1B1B1B] text-[#FFDD2F] border-[#1B1B1B]":"bg-white text-gray-600 border-gray-200 hover:border-gray-400"} disabled:opacity-40`}>{o}</button>)}</div>;
    const MTog = ({options,values=[],onChange,disabled}) => <div className="flex flex-wrap gap-1.5">{options.map(o=>{ const s=values.includes(o); return <button key={o} type="button" onClick={()=>!disabled&&onChange(s?values.filter(v=>v!==o):[...values,o])} disabled={disabled} className={`text-xs px-3 py-1.5 rounded-full border font-semibold transition-all ${s?"bg-[#FFDD2F] text-[#1B1B1B] border-[#FFDD2F]":"bg-white text-gray-600 border-gray-200 hover:border-gray-400"} disabled:opacity-40`}>{o}</button>; })}</div>;
    const FSec = ({title,children}) => <div className="rounded-xl border border-gray-100 bg-gray-50/60 p-4"><p className="text-xs font-bold text-gray-400 uppercase tracking-widest mb-3">{title}</p>{children}</div>;

    const LoadingScreen = () => (
      <div className="min-h-screen flex flex-col items-center justify-center bg-[#1B1B1B]">
        <img src="https://www.mavlers.com/images/MavlersLogo.svg" alt="Mavlers" className="h-9 mb-8 brightness-0 invert"/>
        <Spinner sz="w-8 h-8"/>
      </div>
    );

    const NoAccess = ({onOut,email}) => (
      <div className="min-h-screen flex flex-col items-center justify-center bg-[#1B1B1B] px-4">
        <img src="https://www.mavlers.com/images/MavlersLogo.svg" alt="Mavlers" className="h-9 mb-8 brightness-0 invert"/>
        <div className="bg-white rounded-2xl p-8 max-w-sm w-full text-center shadow-2xl">
          <div className="text-5xl mb-4">🔒</div>
          <h2 className="text-lg font-bold text-[#1B1B1B] mb-2">Access Not Granted</h2>
          <p className="text-sm text-gray-500 mb-1 font-semibold">{email}</p>
          <p className="text-xs text-gray-400 mb-6">is not on the access list. Contact your admin.</p>
          <button onClick={onOut} className="w-full py-2.5 rounded-xl text-sm font-bold bg-[#1B1B1B] text-[#FFDD2F] hover:bg-black transition-colors">Sign Out</button>
        </div>
      </div>
    );

    const AuthPage = () => {
      const [tab,setTab]   = useState("login");
      const [email,setEmail] = useState("");
      const [pass,setPass] = useState("");
      const [busy,setBusy] = useState(false);
      const [err,setErr]   = useState("");
      const [ok,setOk]     = useState("");
      const sw = t => { setTab(t); setErr(""); setOk(""); };
      const go = async e => {
        e.preventDefault(); setErr(""); setOk(""); setBusy(true);
        try {
          if(tab==="forgot") {
            const {error} = await db.auth.resetPasswordForEmail(email.trim(),{redirectTo:window.location.href});
            if(error) throw error;
            setOk("Reset link sent! Check your inbox.");
          } else if(tab==="login") {
            const {error} = await db.auth.signInWithPassword({email:email.trim(),password:pass});
            if(error) throw error;
          } else {
            const {error} = await db.auth.signUp({email:email.trim(),password:pass,options:{emailRedirectTo:window.location.href}});
            if(error) throw error;
            setOk("Account created! You can now sign in."); sw("login");
          }
        } catch(er) { setErr(er.message||"Something went wrong."); }
        setBusy(false);
      };
      return (
        <div className="min-h-screen flex flex-col items-center justify-center bg-[#1B1B1B] px-4 py-10">
          <div className="w-full max-w-sm">
            <div className="text-center mb-8">
              <img src="https://www.mavlers.com/images/MavlersLogo.svg" alt="Mavlers" className="h-10 mx-auto mb-4 brightness-0 invert"/>
              <p className="text-[#FFDD2F] text-xs font-bold tracking-[0.2em] uppercase">Opportunity Tracker</p>
            </div>
            <div className="bg-white rounded-2xl shadow-2xl overflow-hidden">
              {tab!=="forgot" && (
                <div className="flex">
                  {[["login","Sign In"],["signup","Sign Up"]].map(([t,l])=>(
                    <button key={t} onClick={()=>sw(t)} className={`flex-1 py-3.5 text-sm font-bold transition-all ${tab===t?"text-[#1B1B1B] border-b-2 border-[#FFDD2F] bg-[#FFFBEA]":"text-gray-400 border-b border-gray-100 hover:text-gray-600"}`}>{l}</button>
                  ))}
                </div>
              )}
              <form onSubmit={go} className="p-6 space-y-4">
                {tab==="forgot" && <div className="text-center pb-1"><p className="font-bold text-[#1B1B1B]">Reset Password</p><p className="text-xs text-gray-400 mt-1">We'll email you a reset link.</p></div>}
                <div>
                  <FLabel req>Email</FLabel>
                  <FInput type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="you@mavlers.com" required/>
                </div>
                {tab!=="forgot" && (
                  <div>
                    <FLabel req>Password</FLabel>
                    <FInput type="password" value={pass} onChange={e=>setPass(e.target.value)} placeholder="••••••••" required/>
                  </div>
                )}
                {err && <p className="text-xs text-red-600 bg-red-50 rounded-lg px-3 py-2 border border-red-100">{err}</p>}
                {ok  && <p className="text-xs text-green-700 bg-green-50 rounded-lg px-3 py-2 border border-green-100">{ok}</p>}
                <button type="submit" disabled={busy} className="w-full py-3 rounded-xl text-sm font-bold bg-[#FFDD2F] text-[#1B1B1B] hover:bg-[#f5d000] disabled:opacity-60 flex items-center justify-center gap-2 transition-colors">
                  {busy ? <><Spinner sz="w-4 h-4" c="border-[#1B1B1B]"/>Please wait…</> : tab==="login"?"Sign In →":tab==="signup"?"Create Account":"Send Reset Link"}
                </button>
                {tab==="login"  && <button type="button" onClick={()=>sw("forgot")} className="w-full text-xs text-gray-400 hover:text-[#1B1B1B] text-center">Forgot password?</button>}
                {tab==="forgot" && <button type="button" onClick={()=>sw("login")}  className="w-full text-xs text-gray-400 hover:text-[#1B1B1B] text-center">← Back to Sign In</button>}
              </form>
            </div>
            <p className="text-center text-xs text-gray-500 mt-5">Only authorized Mavlers team members can access this tool.</p>
          </div>
        </div>
      );
    };

    const StatCard = ({label,value,sub,hi}) => (
      <div className={`bg-white rounded-xl p-4 shadow-sm border hover:shadow-md transition-shadow ${hi?"border-[#FFDD2F] border-2":"border-gray-100"}`}>
        <p className="text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">{label}</p>
        <p className="text-2xl font-extrabold text-[#1B1B1B] leading-none">{value}</p>
        {sub && <p className="text-xs text-gray-400 mt-1.5 font-medium">{sub}</p>}
      </div>
    );

    const blankForm = () => ({
      clientName:"", industry:"", clientSize:"", website:"", source:"",
      pocName:"", pocTitle:"", pocEmail:"", pocPhone:"",
      opportunityOwner:"", assignedToSales:"",
      opportunityCreationDate: todayStr(),
      engagementType:"", expertiseNeeded:[], expertiseOther:"",
      problemStatement:"", successDefinition:"",
      platforms:[],
      discoveryCallUrl:"", onboardingCallUrl:"",
      scopeOfWork:"", copywritingRequirement:"", emailProductionRequirement:"",
      budgetRange:"", estimatedHours:"", potentialMonthlyRevenue:"",
      projectCost:"", projectTimeline:"",
      clientTimezone:"", supportWindow:"",
      stage:"New Lead", salesNotes:"", debriefNotes:"", additionalNotes:""
    });

    const OppModal = ({editData,userId,role,onClose,onSaved}) => {
      const ops = role==="ops";
      const isEdit = !!editData;
      const initForm = isEdit ? {
        ...blankForm(),
        ...editData,
        platforms: editData.platforms || (editData.primaryPlatform ? [editData.primaryPlatform] : []),
        expertiseOther: editData.expertiseOther || "",
      } : blankForm();
      const [form,setForm] = useState(initForm);
      const [tab,setTab]   = useState(ops?5:0);
      const [busy,setBusy] = useState(false);
      const [err,setErr]   = useState("");
      const f  = k => e => setForm(p=>({...p,[k]:e.target.value}));
      const fv = k => v => setForm(p=>({...p,[k]:v}));
      const hasCopywriting   = (form.expertiseNeeded||[]).includes("Copywriting");
      const hasEmailProd     = (form.expertiseNeeded||[]).includes("Template Production");
      const isP2P            = form.engagementType === "Project-to-Project";
      const save = async () => {
        if(!ops&&!form.clientName){ setErr("Client name is required."); setTab(0); return; }
        setBusy(true); setErr("");
        try {
          const payload = {
            ...form,
            primaryPlatform: (form.platforms||[])[0] || "",
            owner_id: isEdit ? (editData.owner_id||userId) : userId
          };
          if(isEdit){ await dbO.upd(editData.id,payload); onSaved({id:editData.id,created_at:editData.created_at,...payload}); }
          else { const c=await dbO.add(payload); onSaved(c); }
          onClose();
        } catch(er){ setErr(er.message||"Save failed."); setBusy(false); }
      };
      const tabs = [
        // ── Tab 0: Client ────────────────────────────────────────────────
        <div key="client" className="space-y-4">
          <FSec title="Client Info">
            <div className="grid grid-cols-2 gap-3">
              <div className="col-span-2"><FLabel req={!ops}>Client / Company Name</FLabel><FInput value={form.clientName} onChange={f("clientName")} placeholder="e.g. Acme Corp" required={!ops} disabled={ops}/></div>
              <div><FLabel>Domain / Industry</FLabel><FInput value={form.industry} onChange={f("industry")} placeholder="e.g. E-commerce, Fintech" disabled={ops}/></div>
              <div><FLabel>Company Size</FLabel><FSel value={form.clientSize} onChange={f("clientSize")} options={["SMB","Mid-Market","Enterprise"]} disabled={ops}/></div>
              <div><FLabel>Website</FLabel><FInput value={form.website} onChange={f("website")} placeholder="https://" disabled={ops}/></div>
              <div><FLabel>Source</FLabel><FSel value={form.source} onChange={f("source")} options={SOURCES} placeholder="Select source" disabled={ops}/></div>
            </div>
          </FSec>
          <FSec title="Point of Contact">
            <div className="grid grid-cols-2 gap-3">
              <div><FLabel>POC Name</FLabel><FInput value={form.pocName} onChange={f("pocName")} placeholder="e.g. Jane Doe" disabled={ops}/></div>
              <div><FLabel>POC Title</FLabel><FInput value={form.pocTitle} onChange={f("pocTitle")} placeholder="e.g. Head of Marketing" disabled={ops}/></div>
              <div><FLabel>POC Email</FLabel><FInput type="email" value={form.pocEmail} onChange={f("pocEmail")} placeholder="jane@company.com" disabled={ops}/></div>
              <div><FLabel>POC Phone</FLabel><FInput value={form.pocPhone} onChange={f("pocPhone")} placeholder="+91 …" disabled={ops}/></div>
              <div><FLabel>Opportunity Owner (CSM)</FLabel><FInput value={form.opportunityOwner} onChange={f("opportunityOwner")} placeholder="e.g. Rahul Mehta" disabled={ops}/></div>
              <div><FLabel>Assigned Sales</FLabel><FInput value={form.assignedToSales} onChange={f("assignedToSales")} placeholder="e.g. Anita Sharma" disabled={ops}/></div>
              <div><FLabel>Created Date</FLabel><FInput type="date" value={form.opportunityCreationDate} onChange={f("opportunityCreationDate")} disabled={ops}/></div>
            </div>
          </FSec>
        </div>,
        // ── Tab 1: Engagement ────────────────────────────────────────────
        <div key="eng" className="space-y-4">
          <FSec title="Engagement Type">
            <p className="text-xs text-gray-400 mb-3">Select ONE — how this engagement will be structured.</p>
            <Tog options={ENG_TYPES} value={form.engagementType} onChange={fv("engagementType")} disabled={ops}/>
          </FSec>
          <FSec title="Expertise Needed">
            <p className="text-xs text-gray-400 mb-3">Select ALL that apply — determines which teams are involved.</p>
            <MTog options={EXPERTISE} values={form.expertiseNeeded} onChange={fv("expertiseNeeded")} disabled={ops}/>
            <div className="mt-3">
              <FLabel>Other (specify)</FLabel>
              <FInput value={form.expertiseOther} onChange={f("expertiseOther")} placeholder="Describe any additional expertise needed…" disabled={ops}/>
            </div>
          </FSec>
        </div>,
        // ── Tab 2: Problem ───────────────────────────────────────────────
        <div key="prob" className="space-y-4">
          <FSec title="Problem Statement">
            <p className="text-xs text-gray-400 mb-3">Answer both questions — this should be compelling enough for an internal pitch.</p>
            <div className="space-y-3">
              <div><FLabel>What challenge or gap is the client trying to solve?</FLabel><FTxt value={form.problemStatement} onChange={f("problemStatement")} rows={4} placeholder="e.g. Client has no in-house expertise to manage Braze campaigns and is missing key lifecycle triggers." disabled={ops}/></div>
              <div><FLabel>What does success look like to the client?</FLabel><FTxt value={form.successDefinition} onChange={f("successDefinition")} rows={4} placeholder="e.g. Fully configured Braze instance with 3 onboarding flows and ongoing campaign execution support." disabled={ops}/></div>
            </div>
          </FSec>
        </div>,
        // ── Tab 3: Scope ─────────────────────────────────────────────────
        <div key="scope" className="space-y-4">
          <FSec title="Platform & Technology">
            <p className="text-xs text-gray-400 mb-2">Select all platforms in scope — multiple allowed.</p>
            <MTog options={PLATFORMS} values={form.platforms||[]} onChange={fv("platforms")} disabled={ops}/>
          </FSec>
          <FSec title="Call Recordings">
            <div className="grid grid-cols-1 gap-3">
              <div><FLabel>Discovery Call Recording URL</FLabel><FInput value={form.discoveryCallUrl} onChange={f("discoveryCallUrl")} placeholder="https://drive.google.com/… or Loom / Zoom link" disabled={ops}/></div>
              <div><FLabel>Onboarding Call Recording URL</FLabel><FInput value={form.onboardingCallUrl} onChange={f("onboardingCallUrl")} placeholder="https://drive.google.com/… or Loom / Zoom link" disabled={ops}/></div>
            </div>
          </FSec>
          <FSec title="Scope of Work">
            <FTxt value={form.scopeOfWork} onChange={f("scopeOfWork")} placeholder="List what Mavlers will own vs. what the client handles. Be specific about expected deliverables and outputs." rows={4} disabled={ops}/>
          </FSec>
          {hasCopywriting && (
            <FSec title="Copywriting Requirement">
              <p className="text-xs text-gray-400 mb-3">Select ONE — applies since Copywriting is in scope.</p>
              <Tog options={COPY_OPTS} value={form.copywritingRequirement} onChange={fv("copywritingRequirement")} disabled={ops}/>
              <p className="text-xs text-gray-400 mt-2">AI-Driven = fastest, high volume · AI + Human = balanced · Highly Creative = full human-led</p>
            </FSec>
          )}
          {hasEmailProd && (
            <FSec title="Email Production Requirement">
              <p className="text-xs text-gray-400 mb-3">Select ONE — applies since Template Production is in scope.</p>
              <Tog options={EMAIL_OPTS} value={form.emailProductionRequirement} onChange={fv("emailProductionRequirement")} disabled={ops}/>
            </FSec>
          )}
        </div>,
        // ── Tab 4: Decision ──────────────────────────────────────────────
        <div key="dec" className="space-y-4">
          <FSec title="Budget">
            <div><FLabel>Budget Range (if shared)</FLabel><FInput value={form.budgetRange} onChange={f("budgetRange")} placeholder="e.g. ₹5–8L / month, or $10K–15K / month" disabled={ops}/></div>
          </FSec>
          <FSec title="Commercial Details">
            {isP2P ? (
              <div className="grid grid-cols-2 gap-3">
                <div><FLabel>Project Cost (₹)</FLabel><FInput type="number" value={form.projectCost} onChange={f("projectCost")} placeholder="e.g. 500000" disabled={ops}/></div>
                <div><FLabel>Project Timeline</FLabel><FInput value={form.projectTimeline} onChange={f("projectTimeline")} placeholder="e.g. 6 weeks, 3 months" disabled={ops}/></div>
              </div>
            ) : (
              <div className="grid grid-cols-2 gap-3">
                <div><FLabel>Est. Hours / Month</FLabel><FInput type="number" value={form.estimatedHours} onChange={f("estimatedHours")} placeholder="e.g. 80" disabled={ops}/></div>
                <div><FLabel>Potential Monthly Revenue (₹)</FLabel><FInput type="number" value={form.potentialMonthlyRevenue} onChange={f("potentialMonthlyRevenue")} placeholder="e.g. 120000" disabled={ops}/></div>
              </div>
            )}
            <div className="mt-3"><FLabel>Client Timezone</FLabel><Tog options={TIMEZONES} value={form.clientTimezone} onChange={fv("clientTimezone")} disabled={ops}/></div>
            <div className="mt-3"><FLabel>Support Window</FLabel><FInput value={form.supportWindow} onChange={f("supportWindow")} placeholder="e.g. 9 AM – 5 PM AEST, Mon–Fri" disabled={ops}/></div>
          </FSec>
        </div>,
        // ── Tab 5: Pipeline ──────────────────────────────────────────────
        <div key="pip" className="space-y-4">
          <FSec title="Pipeline Stage">
            <div className="grid grid-cols-2 gap-2">
              {STAGES.map(s=>{ const m=STAGE_META[s]; const a=form.stage===s; return <button key={s} type="button" onClick={()=>setForm(p=>({...p,stage:s}))} className={`text-xs px-3 py-2.5 rounded-xl border text-left flex items-center gap-2 font-semibold transition-all ${a?`${m.bg} ${m.text} ${m.border} shadow-sm`:"bg-white text-gray-500 border-gray-200 hover:border-gray-300"}`}><span className={`w-2 h-2 rounded-full flex-shrink-0 ${m.dot}`}/>{s}</button>; })}
            </div>
          </FSec>
          <FSec title="Notes">
            <div className="space-y-3">
              <div><FLabel>Sales Notes</FLabel><FTxt value={form.salesNotes} onChange={f("salesNotes")} placeholder="Context and next steps for the Sales team…" rows={3}/></div>
              <div><FLabel>Ops Debrief Notes</FLabel><FTxt value={form.debriefNotes} onChange={f("debriefNotes")} placeholder="Post-closure debrief for the Ops team…" rows={3}/></div>
              <div><FLabel>Additional Notes</FLabel><FTxt value={form.additionalNotes} onChange={f("additionalNotes")} placeholder="Any other context, constraints, client preferences, or internal flags…" rows={3}/></div>
            </div>
          </FSec>
        </div>,
      ];
      return (
        <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center bg-black/60 backdrop-blur-sm p-0 sm:p-4">
          <div className="bg-white w-full sm:max-w-lg rounded-t-2xl sm:rounded-2xl shadow-2xl flex flex-col max-h-[95vh] overflow-hidden">
            <div className="flex items-center justify-between px-5 py-4 bg-[#1B1B1B]">
              <div>
                <h2 className="text-sm font-bold text-white">{ops?"Update Stage & Notes":isEdit?"Edit Opportunity":"Add New Opportunity"}</h2>
                {!ops && <p className="text-xs text-gray-400 mt-0.5">Step {tab+1}/{MODAL_TABS.length}: {MODAL_TABS[tab]}</p>}
              </div>
              <button onClick={onClose} className="w-7 h-7 flex items-center justify-center rounded-full bg-white/10 text-gray-300 hover:bg-white/20 hover:text-white text-xl leading-none transition-colors">×</button>
            </div>
            {!ops && (
              <div className="flex border-b border-gray-100 bg-gray-50 px-1 overflow-x-auto">
                {MODAL_TABS.map((t,i)=><button key={t} onClick={()=>setTab(i)} className={`px-4 py-2.5 text-xs font-bold whitespace-nowrap transition-colors flex-shrink-0 ${tab===i?"text-[#1B1B1B] border-b-2 border-[#FFDD2F]":"text-gray-400 hover:text-gray-600"}`}>{t}</button>)}
              </div>
            )}
            <div className="flex-1 overflow-y-auto p-4">{tabs[tab]}</div>
            {err && <p className="text-xs text-red-600 bg-red-50 px-5 py-2 border-t border-red-100">{err}</p>}
